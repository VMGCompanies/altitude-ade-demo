<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Altitude Home Loans — Autonomous Digital Employee Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }
    html, body, #root { height: 100%; margin: 0; padding: 0; background: #F8F9FB; color: #1F2937; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }
    @keyframes pulseRing {
      0% { transform: scale(0.9); opacity: 0.55; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes flash {
      0% { background-color: rgba(16,122,230,0.14); }
      100% { background-color: transparent; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(6px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }
    .pulse-ring { animation: pulseRing 1.8s ease-out infinite; }
    .fade-in-up { animation: fadeInUp 0.28s ease-out; }
    .slide-in { animation: slideIn 0.3s ease-out; }
    .flash { animation: flash 1.4s ease-out; }

    .card-shadow { box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 0 0 1px rgba(16, 24, 40, 0.04); }
    .ring-focus:focus { outline: 2px solid #1E3A6B; outline-offset: 2px; }

    .dense-table tr:hover { background: #F8FAFC; }
    .dense-table th { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #6B7280; }

    .grid-bg {
      background-image:
        linear-gradient(rgba(30,58,107,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,58,107,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .brand-navy { color: #1E3A6B; }
    .bg-brand-navy { background: #1E3A6B; }
    .bg-brand-navy-50 { background: #EEF2F8; }
    .bg-brand-navy-100 { background: #DCE3EE; }
    .border-brand-navy { border-color: #1E3A6B; }
    .text-brand-navy-dark { color: #152A4C; }

    .tooltip-wrap { position: relative; }
    .tooltip-wrap:hover .tooltip { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .tooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translate(-50%, 4px);
      background: #1F2937; color: #fff; font-size: 11px; padding: 6px 10px; border-radius: 6px;
      white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.15s ease; z-index: 50;
    }

    input[type="range"] { accent-color: #1E3A6B; }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot-splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#F8F9FB;font-family:'Segoe UI','Inter',-apple-system,BlinkMacSystemFont,sans-serif;z-index:99;">
      <div style="text-align:center;max-width:420px;padding:24px;">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:10px;background:#1E3A6B;margin-bottom:18px;">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20 L9 10 L13 15 L17 8 L21 20 Z"/></svg>
        </div>
        <div style="font-size:14px;font-weight:700;color:#1E3A6B;letter-spacing:0.08em;">ALTITUDE HOME LOANS</div>
        <div style="font-size:11px;color:#6B7280;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:20px;">Autonomous Digital Employee Platform</div>
        <div style="display:inline-block;width:180px;height:3px;background:#DCE3EE;border-radius:3px;overflow:hidden;position:relative;">
          <div style="position:absolute;top:0;left:-40%;width:40%;height:100%;background:#1E3A6B;border-radius:3px;animation:boot-slide 1.1s ease-in-out infinite;"></div>
        </div>
        <div style="font-size:11px;color:#9CA3AF;margin-top:14px;">Initializing · compiling UI · first load takes a few seconds</div>
      </div>
      <style>@keyframes boot-slide{0%{left:-40%}100%{left:100%}}</style>
    </div>
  </div>

  <script>
    // Diagnostic: surface any error that would otherwise silently kill the mount
    window.__bootErrors = [];
    window.addEventListener("error", function(e) {
      window.__bootErrors.push({ msg: e.message, src: e.filename, line: e.lineno });
      showBootError();
    });
    window.addEventListener("unhandledrejection", function(e) {
      window.__bootErrors.push({ msg: "Promise rejection: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason)) });
      showBootError();
    });
    function showBootError() {
      var splash = document.getElementById("boot-splash");
      if (!splash) return;
      var errs = window.__bootErrors.map(function(e){
        return '<div style="font-family:Menlo,Consolas,monospace;font-size:11px;color:#B42318;margin:4px 0;padding:6px;background:#FEF3F2;border:1px solid #FDA29B;border-radius:4px;text-align:left;word-break:break-all;">' +
               (e.msg || "Unknown error") +
               (e.src ? "<br><span style=\"color:#9CA3AF;\">" + e.src.split("/").pop() + ":" + e.line + "</span>" : "") +
               "</div>";
      }).join("");
      splash.innerHTML =
        '<div style="max-width:640px;padding:32px;text-align:center;">' +
          '<div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:#FEE4E2;margin-bottom:14px;">' +
            '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#B42318" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>' +
          '</div>' +
          '<div style="font-size:15px;font-weight:600;color:#B42318;margin-bottom:6px;">Platform failed to initialize</div>' +
          '<div style="font-size:12px;color:#6B7280;margin-bottom:14px;">The UI bundle threw an error before React could mount. Details below — press F12 to see the full stack.</div>' +
          '<div style="max-height:260px;overflow-y:auto;">' + errs + '</div>' +
          '<div style="margin-top:18px;"><button onclick="location.reload()" style="padding:8px 14px;border-radius:6px;background:#1E3A6B;color:#fff;border:0;font-size:13px;cursor:pointer;">Retry</button></div>' +
        '</div>';
    }
    // Watchdog: if splash hasn't been replaced in 25s, show a message
    setTimeout(function() {
      var s = document.getElementById("boot-splash");
      if (!s) return; // React mounted — all good
      if (window.__bootErrors.length > 0) return; // already showing errors
      s.querySelector("div:last-child").innerHTML =
        '<div style="font-size:11px;color:#B45309;margin-top:14px;">Still loading after 25s — something is blocked. Press F12 → Console to see errors.</div>';
    }, 25000);
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useReducer, useCallback, createContext, useContext, Fragment } = React;
    const {
      ResponsiveContainer, LineChart, Line, BarChart, Bar, AreaChart, Area,
      XAxis, YAxis, CartesianGrid, Tooltip: RTooltip, Legend, PieChart, Pie, Cell,
      RadialBarChart, RadialBar
    } = Recharts;

    /* ═════════════════════════════════════════════════════════════════════════════
       ICON SYSTEM — thin wrapper over lucide
    ═════════════════════════════════════════════════════════════════════════════ */
    const Icon = ({ name, size = 16, className = "", strokeWidth = 1.75, style }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = "";
          const el = document.createElement("i");
          el.setAttribute("data-lucide", name);
          ref.current.appendChild(el);
          window.lucide.createIcons({
            attrs: { width: size, height: size, "stroke-width": strokeWidth },
            nameAttr: "data-lucide"
          });
        }
      }, [name, size, strokeWidth]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, ...style }} />;
    };

    /* ═════════════════════════════════════════════════════════════════════════════
       BRAND
    ═════════════════════════════════════════════════════════════════════════════ */
    const BRAND = {
      navy: "#1E3A6B",
      navyDark: "#152A4C",
      navy50: "#EEF2F8",
      navy100: "#DCE3EE",
      accent: "#C89B3C",       // warm secondary, used sparingly
      success: "#0F7D4B",
      warning: "#B45309",
      danger: "#B42318",
      info: "#107AE6",
      surface: "#FFFFFF",
      surface2: "#F8F9FB",
      surface3: "#F3F4F6",
      surface4: "#EEF1F5",
      border: "#E5E7EB",
      border2: "#D1D5DB",
      text: "#1F2937",
      textMuted: "#6B7280",
      textLight: "#9CA3AF",
    };

    /* ═════════════════════════════════════════════════════════════════════════════
       DETERMINISTIC RANDOM (seeded) — so data is stable across renders
    ═════════════════════════════════════════════════════════════════════════════ */
    function seedRand(seed) {
      let s = seed >>> 0;
      return () => {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 4294967296;
      };
    }
    const rand = seedRand(20260420);
    const pick = (arr) => arr[Math.floor(rand() * arr.length)];
    const pickN = (arr, n) => {
      const copy = [...arr]; const out = [];
      for (let i = 0; i < n && copy.length; i++) out.push(copy.splice(Math.floor(rand()*copy.length),1)[0]);
      return out;
    };
    const int = (lo, hi) => lo + Math.floor(rand() * (hi - lo + 1));
    const chance = (p) => rand() < p;
    const maybe = (p, v, d = null) => rand() < p ? v : d;

    /* ═════════════════════════════════════════════════════════════════════════════
       ALTITUDE-SPECIFIC CONSTANTS
    ═════════════════════════════════════════════════════════════════════════════ */
    const MORTGAGEE_CLAUSE = "Altitude Financial Corporation, ISAOA/ATIMA, 1885 N Kolb Rd, Tucson AZ 85715";

    const LQB_SCREENS = [
      "This Loan Info",
      "Agents",
      "Title & Estate",
      "Disclosure Center",
      "Processing",
      "Loan Application",
      "Internal Comments"
    ];

    const LQB_FOLDERS = [
      "Pre-Closing Folder",
      "Initial Disclosure Folder",
      "Prelim Folder",
      "Pre-Closing Folder > Invoices Doc Type",
      "Pre-Closing Folder > Sign at Closing Doc Type",
      "Pre-Closing Folder > Processor Requests Doc Type",
      "Pre-Closing Folder > Wire Instructions Doc Type",
      "Pre-Closing Folder > Closing Docs Request Doc Type",
      "Pre-Closing Folder > VOE 1",
      "Pre-Closing Folder > VOE 2",
      "Pre-Closing Folder > VOE 3"
    ];

    /* ─── JP File Set-Up Checklist (26 items) ────────────────────────────────── */
    const JP_CHECKLIST = [
      { id: "js-1",  label: "Application & Disclosures split; FHA/VA disclosures split separately",
        rule: "Initial 1003 and disclosures must be split as separate PDF objects in LQB. FHA/VA disclosures are isolated into their own file objects.",
        ref: "LQB → Loan Application screen; Disclosure Center screen" },
      { id: "js-2",  label: "USPS Printout uploaded; address matches LQB before ordering any services",
        rule: "USPS address verification printout uploaded and compared character-by-character to subject property on This Loan Info screen.",
        ref: "USPS Address Verify; LQB → This Loan Info" },
      { id: "js-3",  label: "Current Property Tax Printout uploaded; monthly tax amount verified on This Loan Info",
        rule: "County tax portal printout parsed; annual tax / 12 compared against monthly tax on This Loan Info screen; variance >$5/mo triggers update.",
        ref: "LQB → This Loan Info" },
      { id: "js-4",  label: "Flood Certification requested & received; flood zone identified; processor notified if in flood zone",
        rule: "CoreLogic flood determination pulled; zone captured. If Zone A/V, processor notified immediately via Internal Comments and email.",
        ref: "CoreLogic; LQB → Internal Comments" },
      { id: "js-5",  label: "Agents Setup — Escrow & Title license numbers, Sellers, Listing/Buyer Agent on Agents screen",
        rule: "Each agent slot on Agents screen validated: License #, Branch Address, Phone — cross-checked against Master List. Missing agents escalate to agents@altitudehomeloans.com.",
        ref: "LQB → Agents screen; Master List" },
      { id: "js-6",  label: "Title Docs requested; processor copied; 3-day follow-up task created",
        rule: "Title request sent with processor cc'd; automated 3-business-day follow-up task scheduled in LQB task queue.",
        ref: "Email; LQB → Processing screen tasks" },
      { id: "js-7",  label: "Pre-Audit CD reviewed against LQB and Agent screen",
        rule: "Borrower names, property address, purchase price, loan amount, sellers name/address, escrow officer branch, title company branch license — all compared to LQB values.",
        ref: "LQB → Loan Application, Agents" },
      { id: "js-8",  label: "CPL — names, address, loan #, mortgagee clause, 60-day rule, escrow officer branch, signature",
        rule: `Closing Protection Letter verified against LQB. Mortgagee clause must match verbatim: "${MORTGAGEE_CLAUSE}". Closing date must be funding-date-or-later or removed. Date within 60 days of funding.`,
        ref: "Prelim Folder; LQB → Loan Application" },
      { id: "js-9",  label: "Earnest Money — amount matches purchase contract (purchases only)",
        rule: "Earnest money deposit on contract parsed and matched against amount on 1003 and Pre-Audit CD. Purchases only.",
        ref: "LQB → Loan Application" },
      { id: "js-10", label: "Wire Instructions — borrower names, property, bank name/account#/ABA match Agent screen and Master List",
        rule: "Wire instructions OCR'd; bank name, account #, ABA # checked against Agents screen AND Master List. Any mismatch halts file.",
        ref: "LQB → Agents; Master List" },
      { id: "js-11", label: "Prelim — names w/ vesting, mortgagee clause, loan/sales match LQB, 60-day rule, address matches escrow branch",
        rule: `Preliminary Title Report parsed. Names including Title Only Party with vesting verified. Altitude mortgagee clause verbatim. Loan amount & sales price match LQB & Lock. VA+PUD triggers CC&R order and Plat Map chain into Prelim Folder.`,
        ref: "Prelim Folder; LQB → Loan Application, Agents" },
      { id: "js-12", label: "Manufactured Homes — Affidavit of Affixture requested from Title",
        rule: "If manufactured home flag set, Affidavit of Affixture request generated to Title Company and logged.",
        ref: "LQB → Internal Comments; Email" },
      { id: "js-13", label: "Payoff ordered when processor indicates ready (refinances only)",
        rule: "Payoff request drafted; held until processor greenlight. Refinances only.",
        ref: "LQB → Internal Comments" },
      { id: "js-14", label: "Title License — # and branch address match LQB, Master List, and CD from Title",
        rule: "Title branch license # and address compared across Agents screen, Master List, and Title-issued CD. Three-way match required.",
        ref: "LQB → Agents; Master List" },
      { id: "js-15", label: "Deed of Trust for loan being paid off (refinances only)",
        rule: "Existing DOT pulled from county records; compared to loan being paid off. Refinances only.",
        ref: "County Recorder; LQB → This Loan Info" },
      { id: "js-16", label: "Hazard Insurance — names/address/mortgagee/loan#/policy#/premium/effective date/dwelling ≥ loan amount OR RCE; policy not binder",
        rule: `Hazard dec page parsed. Effective date ≤ funding date AND in month of funding. Dwelling coverage ≥ loan amount OR RCE present. Mortgagee clause verbatim. Must be a policy, not a binder.`,
        ref: "Email; Pre-Closing Folder" },
      { id: "js-17", label: "VOEs requested for ALL borrowers & employers (VOE 1/2/3), processor copied, dates logged",
        rule: "The Work Number request for each borrower × employer combo. Processor cc'd. Request date logged on Processing screen.",
        ref: "The Work Number; LQB → Processing screen" },
      { id: "js-18", label: "Document-order dates logged on Processing screen under Status in LQB",
        rule: "Every outbound document request captures a date stamp into LQB Processing Status field.",
        ref: "LQB → Processing screen" },
      { id: "js-19", label: "Checklist uploaded to Processor Requests; labeled in Internal Comments",
        rule: "Completed JP Checklist PDF uploaded to Pre-Closing Folder > Processor Requests Doc Type. Upload noted in Internal Comments and categorized as Processor.",
        ref: "LQB → Processor Requests; Internal Comments" },
      { id: "js-20", label: "Conversation Log entry posted — date file was set up + helpful processor notes, category: Processor",
        rule: "Mandatory Internal Comments entry on file set-up date; categorized as Processor.",
        ref: "LQB → Internal Comments" },
      { id: "js-21", label: "Flood Insurance — hazard fields PLUS flood zone matches Cert; 1-year term; max dwelling $250,000",
        rule: "All hazard fields PLUS flood zone evidence matches Flood Certificate, 1-year term, dwelling coverage ≤ $250,000.",
        ref: "Pre-Closing Folder" },
      { id: "js-22", label: "Condos & Multi-Units — unit number listed with property address",
        rule: "For condo/multi-unit, unit number must appear on property address. If missing on any doc, escalate to processor.",
        ref: "LQB → This Loan Info" },
      { id: "js-23", label: "HO6 Policy — all hazard fields; dwelling ≥ 20% of appraised value (when applicable)",
        rule: "HO6 dwelling coverage ≥ 20% of appraised value. All standard hazard fields required.",
        ref: "Pre-Closing Folder" },
      { id: "js-24", label: "Master Policy — all hazard fields; walls-in betterments (HO6 not required); min $1,000,000 coverage",
        rule: "Master policy ≥ $1,000,000 general liability / property coverage; if walls-in betterments rider present, HO6 not required.",
        ref: "Pre-Closing Folder" },
      { id: "js-25", label: "Master List follow-up — Escrow, Listing Agent, Buyer Agent, Homeowners, Master Policy Agent, Flood Provider, VA Appraiser",
        rule: "For each role with data, Master List entry checked/created. Missing data routed to processor for collection.",
        ref: "Master List" },
      { id: "js-26", label: "Agent submissions to Master List — drafted with correct Subject Line convention and attachments",
        rule: `Email drafts to agents@altitudehomeloans.com with subject convention "<Type> Added to Contact Master List — <Last>, #<LoanTail>". Attachments per role (Wire Instructions / CD / Prelim / License / EOI / Contract Signature Page).`,
        ref: "Email; Master List" }
    ];

    /* ─── Processor Closing Checklist (11 items) ──────────────────────────────── */
    const PC_CHECKLIST = [
      { id: "pc-1", label: "CPL — borrower names, property address, loan #, mortgagee clause verbatim, within 60 days of funding, signed",
        rule: `CPL reverified pre-close. Altitude mortgagee clause character-match required: "${MORTGAGEE_CLAUSE}". Closing date within 60 days of funding. Signature present.`,
        ref: "Pre-Closing Folder; LQB → Loan Application" },
      { id: "pc-2", label: "Prelim / Title Commitment — names match LQB & ID incl. Title Only Party, vesting, mortgagee, loan/sales match Lock, 60-day, Title & Estate screen complete",
        rule: "Borrower name on prelim character-match to name on ID (within tolerance for hyphens/suffixes). Loan amount & sales price match LQB and Lock Confirmation. Title & Estate screen names/SSN/DOB/email complete. Title Only Party → Non-Obligate Borrowers section complete.",
        ref: "Prelim Folder; LQB → Title & Estate; Lock Confirmation" },
      { id: "pc-3", label: "Hazard Insurance — deductible ≤ $5,000 or 5% of dwelling (USDA/Bond: $1,000 or 1%); invoice or paid-in-full receipt",
        rule: "Deductible limit enforced — standard $5,000 or 5% dwelling; USDA/Bond $1,000 or 1%. Invoice or paid-in-full receipt for current period attached.",
        ref: "Pre-Closing Folder" },
      { id: "pc-4", label: "Title License — uploaded to Pre-Closing; branch license # and escrow officer match Agents screen",
        rule: "Title license in Pre-Closing Folder. Branch license and office escrow officer reconciled against Agents screen.",
        ref: "Pre-Closing Folder; LQB → Agents" },
      { id: "pc-5", label: "Flood Certification — flood zone captured; borrowers signed Flood Notice",
        rule: "Flood Zone captured; borrower-signed Flood Hazard Determination Notice in file.",
        ref: "Pre-Closing Folder" },
      { id: "pc-6", label: "Flood Insurance — full field set; dwelling max $250,000; new policy 1-year term; if application only, mortgagee & loan # must appear",
        rule: "Full hazard field set + flood specifics. Max dwelling $250K. New policy is 1-year. Application-only fallback requires mortgagee clause and loan number present.",
        ref: "Pre-Closing Folder" },
      { id: "pc-7", label: "Mortgage Insurance — MI Cert uploaded & reviewed; monthly/annual premium in LQB matches MI Cert",
        rule: "MI Certificate uploaded by UW; premiums reconciled against LQB to the cent.",
        ref: "Pre-Closing Folder; LQB → This Loan Info" },
      { id: "pc-8", label: "Fees — all invoices in Pre-Closing > Invoices; Appraisal / Final Inspection / IBTS / Engineering / Condo Q / Condo Master / Termite / Misc updated in LQB",
        rule: "Every invoice uploaded separately with description and fee amount. Named fees updated in LQB and accurate before ordering closing docs. TRID team escalation if guidance needed.",
        ref: "Pre-Closing Folder > Invoices Doc Type; LQB → This Loan Info" },
      { id: "pc-9", label: "VVOE — within 5 days of funding (10 self-employed; FHA day-of or day-before; second PTF for FHA); uploaded to VOE 1/2/3, screened",
        rule: "VVOE timing enforced per product. FHA may trigger second VVOE PTF. VOE uploaded to VOE 1/2/3 slot and screened.",
        ref: "The Work Number; Pre-Closing Folder > VOE 1/2/3" },
      { id: "pc-10", label: "Misc — PUD reflected in LQB + Lock, lock through funding, PITIA ≤ UW max, PTD conditions resolved, POA/Trust/Title Only sections complete, interest credit/signing/funding dates accurate, escrow waiver reflected",
        rule: "Multi-field reconciliation: Property Type PUD flag in This Loan Info AND Lock. Rate lock expiration > funding date. PITIA calculated ≤ UW maximum. All PTD conditions closed. POA/Trust borrower names match docs and approved. Title Only Borrowers section complete. Interest credit, signing, funding dates accurate in LQB. Escrow waiver mirrored across LQB and Lock when impounds waived.",
        ref: "LQB → This Loan Info; Lock Confirmation; Title & Estate" },
      { id: "pc-11", label: "Uploads — Wire Instructions, Doc Request Cover Page, Final LE w/ COC, ICD, Sign-at-Closing Docs all filed; Processor Closing Checklist uploaded (DO NOT screen)",
        rule: "Wire Instructions → Pre-Closing > Wire Instructions Doc Type (screened). Doc Request Cover Page with important file notes → Pre-Closing > Closing Docs Request (screened). Final LE signed + COC → Initial Disclosure Folder > LE Redisclosed w/ COC (screened + logged in Disclosure Center). ICD signed + uploaded. Sign-at-Closing docs → Pre-Closing > Sign at Closing. Processor Closing Checklist → Pre-Closing > Checklist Doc Type (DO NOT screen).",
        ref: "Pre-Closing Folder; Initial Disclosure Folder; Disclosure Center" }
    ];

    /* ═════════════════════════════════════════════════════════════════════════════
       DATA GENERATION — 40+ loans with full checklist state, docs, conditions, history
    ═════════════════════════════════════════════════════════════════════════════ */
    const FIRST_NAMES = ["Maria","Miguel","Carlos","Sofia","Diego","Isabella","Luis","Elena","Javier","Camila","Rafael","Valentina","Emilio","Ximena","Mateo","Lucia","Alejandro","Adriana","Ricardo","Daniela","James","Olivia","Noah","Emma","William","Ava","Ethan","Charlotte","Liam","Amelia","Aiden","Harper","Caleb","Evelyn","Logan","Abigail","Nguyen","Trinh","Aditya","Priya","Raj","Anjali","Dmitri","Anna","Yusuf","Fatima","Kai","Leilani","Jamal","Imani"];
    const LAST_NAMES = ["Rodriguez","Hernandez","Martinez","Garcia","Lopez","Gonzalez","Perez","Sanchez","Ramirez","Torres","Flores","Rivera","Gomez","Diaz","Cruz","Morales","Ortiz","Gutierrez","Chavez","Ramos","Ruiz","Mendoza","Aguilar","Castillo","Jimenez","Vargas","Navarro","Guerrero","Rojas","Medina","Nguyen","Tran","Pham","Patel","Singh","Kim","Park","Cho","Wagner","Becker","Schmidt","Brooks","Carter","Davis","Edwards","Foster","Greene","Hayes","Irving","Jacobs","Kelly","Lawson","Murphy","Nolan","Owens","Parker","Quinn","Reyes","Stone","Turner","Walsh","Young","Zimmerman","Rodriguez-Chavez","O'Brien","Begay","Yazzie"];
    const EMPLOYERS = ["Raytheon Technologies","Banner Health","Pima Community College","University of Arizona","Tucson Electric Power","Freeport-McMoRan","Honeywell Aerospace","ASU","Intel Corporation","City of Tucson","Tucson Medical Center","Caterpillar","Desert Diamond","US Air Force","Pima County","Carondelet Health Network","Davis-Monthan AFB","Sanofi","State Farm","Northern Arizona University","IBM","Boeing","American Express","Wells Fargo","Target","Amazon","Costco Wholesale","GEICO","Deloitte","Kforce"];
    const LOAN_OFFICERS = ["Sarah Mitchell","Diego Hernandez","Kelly Anderson","Marcus Thompson","Priya Patel","Jordan Ellis","Rosa Delgado","Ahmed Rahimi","Kate Lindqvist","Trevor Holloway","Nina Volkov","Brandon Cho"];
    const PROCESSORS = ["Jessica Alvarez","Ryan Whitaker","Monica Flores","Derek Chen","Hannah Kowalski","Samira Patel"];
    const AZ_CITIES = [["Tucson","85715"],["Tucson","85718"],["Tucson","85741"],["Oro Valley","85755"],["Marana","85658"],["Sahuarita","85629"],["Vail","85641"],["Phoenix","85016"],["Phoenix","85028"],["Scottsdale","85254"],["Scottsdale","85260"],["Mesa","85205"],["Tempe","85281"],["Chandler","85248"],["Gilbert","85295"],["Flagstaff","86001"],["Sedona","86336"],["Prescott","86303"]];
    const CO_CITIES = [["Denver","80203"],["Boulder","80301"],["Colorado Springs","80903"],["Fort Collins","80521"]];
    const NV_CITIES = [["Las Vegas","89117"],["Henderson","89052"],["Reno","89511"]];
    const UT_CITIES = [["Salt Lake City","84103"],["Provo","84604"],["St. George","84770"]];
    const TX_CITIES = [["El Paso","79912"],["Austin","78704"],["Dallas","75219"]];
    const STREETS = ["Desert Sage","Saguaro Ridge","Cactus Wren","Tumamoc","Canyon Vista","Rincon Peak","Silver Spur","Mission View","Agave","Catalina","Sunset Canyon","Rillito","Speedway","Broadway","Grant","Camino Real","Old Spanish Trail","Placita","Via Dolorosa","Fort Lowell","La Cholla","Ina","Skyline","Sunrise","Swan","Craycroft","Tanque Verde","Harrison","Houghton","Pantano"];
    const STREET_SUFFIX = ["Dr","Ln","Way","Pl","Ct","Blvd","St","Rd","Trl","Ave"];

    const PRODUCTS = ["Conventional","FHA","VA","USDA","Jumbo","Bond"];
    const PRODUCT_WEIGHTS = [0.38, 0.22, 0.16, 0.06, 0.12, 0.06];
    const MILESTONES = ["Application","File Set-Up","Docs In","Verification","UW Submission","Conditions","Pre-Close","Clear to Close"];
    const MILESTONE_WEIGHTS = [0.05, 0.20, 0.15, 0.15, 0.12, 0.18, 0.10, 0.05];

    function weightedPick(arr, w) {
      let r = rand(), acc = 0;
      for (let i = 0; i < arr.length; i++) { acc += w[i]; if (r < acc) return arr[i]; }
      return arr[arr.length - 1];
    }

    function genAddress() {
      const locPool = [...AZ_CITIES, ...AZ_CITIES, ...AZ_CITIES, ...AZ_CITIES, ...CO_CITIES, ...NV_CITIES, ...UT_CITIES, ...TX_CITIES];
      const [city, zip] = pick(locPool);
      const state = AZ_CITIES.some(c=>c[0]===city) ? "AZ" :
                    CO_CITIES.some(c=>c[0]===city) ? "CO" :
                    NV_CITIES.some(c=>c[0]===city) ? "NV" :
                    UT_CITIES.some(c=>c[0]===city) ? "UT" : "TX";
      return { street: `${int(100,9999)} ${pick(STREETS)} ${pick(STREET_SUFFIX)}`, city, state, zip };
    }
    function genName() { return `${pick(FIRST_NAMES)} ${pick(LAST_NAMES)}`; }

    function fmtMoney(n, decimals=0) {
      return "$" + n.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }
    function fmtDate(d) {
      if (!d) return "—";
      const dt = (d instanceof Date) ? d : new Date(d);
      return dt.toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" });
    }
    function fmtDateTime(d) {
      const dt = (d instanceof Date) ? d : new Date(d);
      return dt.toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }
    function fmtTime(d) {
      const dt = (d instanceof Date) ? d : new Date(d);
      return dt.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
    }
    function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return d; }

    /* ─── Build a single loan ────────────────────────────────────────────────── */
    function buildLoan(seq) {
      const number = `AHL-2026-${(4800 + seq).toString().padStart(5, "0")}`;
      const borrower = genName();
      const hasCoBorrower = chance(0.55);
      const coBorrower = hasCoBorrower ? genName() : null;
      const property = genAddress();
      const product = weightedPick(PRODUCTS, PRODUCT_WEIGHTS);

      const isRefi = chance(0.22);
      const txnType = isRefi ? pick(["Rate/Term Refi","Cash-Out Refi"]) : "Purchase";
      const appraisedValue = int(180, 1400) * 1000;
      const amount = Math.round(appraisedValue * (0.70 + rand()*0.25) / 1000) * 1000;
      const ltv = +(amount / appraisedValue * 100).toFixed(1);
      const dti = +(26 + rand() * 22).toFixed(1);
      const rate = +(5.625 + rand() * 1.75).toFixed(3);

      const milestone = weightedPick(MILESTONES, MILESTONE_WEIGHTS);
      const milestoneIdx = MILESTONES.indexOf(milestone);

      const propertyType = (() => {
        const r = rand();
        if (product === "VA" && r < 0.30) return "PUD";
        if (r < 0.55) return "SFR";
        if (r < 0.72) return "PUD";
        if (r < 0.87) return "Condo";
        if (r < 0.94) return "Manufactured";
        return "Multi-Unit";
      })();

      const flags = {
        isRefi,
        isVA_PUD: product === "VA" && propertyType === "PUD",
        isManufactured: propertyType === "Manufactured",
        isCondo: propertyType === "Condo",
        isUSDAorBond: product === "USDA" || product === "Bond",
        isMultiUnit: propertyType === "Multi-Unit",
        hasPOA: chance(0.08),
        hasTrust: chance(0.06),
        hasTitleOnly: chance(0.12),
        selfEmployed: chance(0.22)
      };

      const loanOfficer = pick(LOAN_OFFICERS);
      const processor = pick(PROCESSORS);
      const applicationDate = daysAgo(int(2, 48));
      const fundingDate = new Date(applicationDate); fundingDate.setDate(fundingDate.getDate() + int(28, 55));
      const employer = pick(EMPLOYERS);
      const coEmployer = hasCoBorrower ? pick(EMPLOYERS) : null;

      /* Per-loan checklist status — weighted by milestone progress */
      const progressRatio = Math.max(0.15, Math.min(0.98, (milestoneIdx + rand()*1.2) / (MILESTONES.length - 1)));
      const buildChecklistStatus = (items, tilt = 0) => items.map((it, idx) => {
        const p = Math.max(0, Math.min(1, progressRatio + tilt - (idx / items.length) * 0.05 + (rand()-0.5)*0.15));
        let status;
        const r = rand();
        if (p > 0.85) status = r < 0.90 ? "verified" : (r < 0.95 ? "escalated" : "pending");
        else if (p > 0.55) status = r < 0.78 ? "verified" : (r < 0.92 ? "escalated" : "pending");
        else if (p > 0.25) status = r < 0.45 ? "verified" : (r < 0.62 ? "escalated" : (r < 0.85 ? "pending" : "failed"));
        else status = r < 0.22 ? "verified" : (r < 0.38 ? "escalated" : "pending");

        // product-based overrides / flag gating
        if (it.id === "js-12" && !flags.isManufactured) status = "n/a";
        if (it.id === "js-13" && !isRefi) status = "n/a";
        if (it.id === "js-15" && !isRefi) status = "n/a";
        if (it.id === "js-9"  && isRefi) status = "n/a";
        if (it.id === "js-22" && !(flags.isCondo || flags.isMultiUnit)) status = "n/a";
        if (it.id === "js-23" && !flags.isCondo) status = "n/a";
        if (it.id === "js-24" && !flags.isCondo) status = "n/a";

        const confidence = status === "verified" ? +(0.932 + rand()*0.064).toFixed(3) :
                           status === "escalated" ? +(0.55 + rand()*0.30).toFixed(3) :
                           status === "failed" ? +(0.30 + rand()*0.25).toFixed(3) :
                           status === "pending" ? null : null;
        const ts = status === "pending" || status === "n/a" ? null :
                   new Date(Date.now() - int(1, 72) * 3600 * 1000);

        return { ...it, status, confidence, ts, evidence: genEvidence(it, { borrower, coBorrower, property, amount, appraisedValue, number, product, fundingDate, flags }) };
      });

      const jp = buildChecklistStatus(JP_CHECKLIST, 0.05);
      const pc = buildChecklistStatus(PC_CHECKLIST, milestoneIdx >= 5 ? 0.02 : -0.35);

      /* Documents */
      const docTypes = [
        "1003 Loan Application","Credit Report","Paystub","W-2","Tax Return","Bank Statement",
        "USPS Address Verify","Property Tax Printout","Flood Certificate","CPL","Preliminary Title Report",
        "Wire Instructions","Hazard Dec Page","Flood Dec Page","VOE (Work Number)","Purchase Contract",
        "Government ID","Appraisal Report","Title Commitment","Final LE","Closing Disclosure","ICD","MI Certificate"
      ];
      if (flags.isCondo) docTypes.push("HO6 Policy","Master Policy");
      if (flags.isManufactured) docTypes.push("Affidavit of Affixture");
      if (isRefi) docTypes.push("Payoff Statement","Deed of Trust (Existing)");
      if (flags.isVA_PUD) docTypes.push("CC&Rs","Plat Map");
      const numDocs = int(12, 18);
      const chosenDocs = pickN(docTypes, Math.min(numDocs, docTypes.length));
      const documents = chosenDocs.map((t, i) => ({
        id: `${number}-doc-${i}`,
        type: t,
        filename: `${t.replace(/[^a-z0-9]+/gi,"_")}_${number}.pdf`,
        uploaded: new Date(Date.now() - int(1, 30) * 24 * 3600 * 1000),
        source: pick(["Borrower Upload","LO","Title Co.","Insurance Agent","The Work Number","CoreLogic","County Portal","Internal"]),
        classifierConfidence: +(0.86 + rand()*0.13).toFixed(3),
        ocrQuality: pick(["Excellent","Excellent","Good","Good","Fair"]),
        pages: int(1, 24),
        fields: int(8, 42),
        extracted: genExtraction(t, { borrower, coBorrower, property, amount, number, fundingDate }),
        handledBy: pick(["ADE","ADE","ADE","ADE","Human"]),
        status: pick(["Verified","Verified","Verified","Under Review","Escalated"])
      }));

      /* Conditions */
      const conditionLib = [
        { t: "Provide most recent 2 months bank statements — all pages", tag: "PTD", src: "DU" },
        { t: `Provide LOE for large deposit of ${fmtMoney(int(8000,24000))} on ${fmtDate(daysAgo(int(10,40)))}`, tag: "PTD", src: "DU" },
        { t: "Provide most recent paystub covering 30 days", tag: "PTD", src: "DU" },
        { t: "Provide signed & dated 4506-C", tag: "PTD", src: "DU" },
        { t: "Provide homeowners insurance dec page with dwelling coverage ≥ loan amount", tag: "PTD", src: "UW" },
        { t: "CPL to reflect Altitude Financial Corporation, ISAOA/ATIMA at 1885 N Kolb Rd, Tucson AZ 85715", tag: "PTD", src: "UW" },
        { t: "Second VVOE required PTF — FHA", tag: "PTF", src: "UW" },
        { t: "Title Only Party — complete Non-Obligate Borrowers section on Title & Estate screen", tag: "PTD", src: "UW" },
        { t: "Provide final executed purchase contract with all addenda", tag: "PTD", src: "UW" },
        { t: "Wire Instructions must match bank on Agents screen and Master List", tag: "PTF", src: "UW" },
        { t: "Flood Insurance — provide 1-year policy with dwelling coverage ≥ loan balance (capped $250K)", tag: "PTD", src: "UW" },
        { t: "Provide PUD CC&Rs (VA)", tag: "PTD", src: "UW" },
        { t: "Affidavit of Affixture from Title (Manufactured Home)", tag: "PTD", src: "UW" },
        { t: "Provide Payoff Statement good through funding date", tag: "PTF", src: "UW" },
        { t: "HO6 Policy — dwelling coverage ≥ 20% of appraised value", tag: "PTD", src: "UW" },
        { t: "Updated VOE within 5 days of funding (10 for self-employed)", tag: "PTF", src: "UW" },
        { t: "Rate lock must extend through funding date", tag: "PTF", src: "UW" },
        { t: "Hazard deductible must not exceed $5,000 or 5% dwelling", tag: "PTD", src: "UW" }
      ];
      const condCount = int(5, 12);
      const condSelected = pickN(conditionLib, condCount);
      const conditions = condSelected.map((c, i) => {
        const r = rand();
        const status = r < 0.48 ? "Cleared by ADE" :
                       r < 0.68 ? "Outstanding" :
                       r < 0.82 ? "Escalated" :
                       r < 0.92 ? "Submitted to UW" : "Human Cleared";
        return {
          id: `${number}-cond-${i}`,
          idx: i + 1,
          text: c.t,
          tag: c.tag,
          source: c.src,
          status,
          clearedAt: (status === "Cleared by ADE" || status === "Human Cleared") ? new Date(Date.now() - int(1, 48) * 3600 * 1000) : null,
          reasoning: status === "Cleared by ADE" ? pick([
            `Matched against ${pick(["W-2","Paystub","Bank Stmt","Purchase Contract","CPL","Prelim","Hazard Dec","VOE"])} — all fields validate.`,
            `Altitude mortgagee clause verified verbatim on document.`,
            `Date check passed — within required window.`,
            `Deductible ${fmtMoney(int(1000,5000))} ≤ rule threshold.`,
            `Extraction confidence ${(0.94 + rand()*0.05).toFixed(3)}; no flags raised.`
          ]) : null
        };
      });

      /* Decision history */
      const historyLib = [
        (r) => `Parsed W-2 for ${borrower} (${employer}) — ${int(18,28)} fields extracted @ ${(0.92+r*0.07).toFixed(3)}`,
        (r) => `CPL mortgagee clause character-match against "${MORTGAGEE_CLAUSE}" — PASS`,
        (r) => `Prelim name check — "${borrower}" matches ID within tolerance`,
        (r) => `DU submitted — awaiting findings`,
        (r) => `VOE received from The Work Number for ${employer} — employer and income match 1003`,
        (r) => `Hazard deductible check — ${fmtMoney(int(500,5500))} vs ${flags.isUSDAorBond ? "$1,000" : "$5,000"} cap`,
        (r) => `Wire Instructions three-way match: Agents screen ↔ Master List ↔ Wire Doc — PASS`,
        (r) => `Property Tax Printout — monthly ${fmtMoney(int(150,900))} updated on This Loan Info screen`,
        (r) => `USPS Address Verify — exact match to LQB subject property`,
        (r) => `Flood Cert received — Zone ${pick(["X","X","A","AE"])}`,
        (r) => `Agents screen: Listing Agent ${pick(LAST_NAMES)}, License #${int(500000, 899999)} — verified against Master List`,
        (r) => `Internal Comments entry posted (category: Processor) — file set-up completed ${fmtDate(applicationDate)}`,
        (r) => `Condition #${int(1, 10)} cleared — ${pick(["Bank stmt pages complete","LOE received & reasonable","Paystub current","Insurance coverage sufficient"])}`,
        (r) => `Master List agent submission drafted — Subject: "${pick(["Title","Escrow","Realtor","Homeowners"])} Added to Contact Master List — ${pick(LAST_NAMES)}, #${number.slice(-5)}"`,
        (r) => `Final LE + COC uploaded to Initial Disclosure Folder > LE Redisclosed w/ COC; logged on Disclosure Center screen`,
        (r) => `VVOE window check — ${int(1, 9)} days to funding (within ${flags.selfEmployed ? "10-day" : "5-day"} rule)`,
        (r) => `Title & Estate screen completeness check — all required fields present`,
        (r) => `Checklist uploaded to Pre-Closing > Processor Requests Doc Type — logged in Internal Comments`
      ];
      const historyCount = int(20, 40);
      const history = [];
      for (let i = 0; i < historyCount; i++) {
        const fn = pick(historyLib);
        history.push({
          id: `${number}-hist-${i}`,
          ts: new Date(Date.now() - int(1, 72*60) * 60 * 1000),
          actor: chance(0.86) ? "ADE: Dynamic Loan Processor" : `Human: ${processor}`,
          message: fn(rand()),
          confidence: chance(0.8) ? +(0.88 + rand()*0.11).toFixed(3) : null
        });
      }
      history.sort((a,b) => b.ts - a.ts);

      /* Lock / key facts */
      const lock = {
        rate,
        lockExpires: new Date(fundingDate.getTime() + int(-3, 14) * 24 * 3600 * 1000),
        pud: propertyType === "PUD",
        escrowWaived: chance(0.15),
        monthlyMI: product === "FHA" || product === "Conventional" && ltv > 80 ? +(amount * 0.00055).toFixed(2) : 0
      };

      return {
        number, borrower, coBorrower, property, product, amount, ltv, dti, rate,
        milestone, milestoneIdx, txnType, propertyType, flags, loanOfficer, processor,
        applicationDate, fundingDate, appraisedValue, employer, coEmployer,
        jp, pc, documents, conditions, history, lock,
        adeStatus: chance(0.90) ? "Active" : pick(["Paused","Awaiting Human"]),
        lastAction: history[0]?.message || "—",
        lastActionTs: history[0]?.ts || new Date()
      };
    }

    function genEvidence(item, ctx) {
      const { borrower, property, amount, number, fundingDate } = ctx;
      const map = {
        "js-2": { doc: "USPS_AddressVerify.pdf", fields: [
          ["USPS Standardized", `${property.street}, ${property.city}, ${property.state} ${property.zip}`],
          ["LQB This Loan Info", `${property.street}, ${property.city}, ${property.state} ${property.zip}`],
          ["Match", "EXACT"]
        ]},
        "js-8": { doc: "CPL_TitleCo.pdf", fields: [
          ["Borrowers on CPL", ctx.coBorrower ? `${borrower}; ${ctx.coBorrower}` : borrower],
          ["Property", `${property.street}, ${property.city}, ${property.state} ${property.zip}`],
          ["Loan #", number],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE],
          ["Issue Date", fmtDate(daysAgo(int(5, 45)))],
          ["Funding Date (LQB)", fmtDate(fundingDate)],
          ["Within 60 days of funding", "PASS"],
          ["Signed", "YES"]
        ]},
        "js-11": { doc: "Prelim_Commitment.pdf", fields: [
          ["Names + Vesting", ctx.coBorrower ? `${borrower} and ${ctx.coBorrower}, husband and wife as joint tenants` : `${borrower}, a single person`],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE],
          ["Loan Amount (Prelim)", fmtMoney(amount)],
          ["Loan Amount (LQB)", fmtMoney(amount)],
          ["Within 60 days of funding", "PASS"]
        ]},
        "js-16": { doc: "Hazard_DecPage.pdf", fields: [
          ["Named Insured", ctx.coBorrower ? `${borrower} & ${ctx.coBorrower}` : borrower],
          ["Property", `${property.street}, ${property.city}`],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE],
          ["Loan Number", number],
          ["Policy Number", `HO-${int(1000000, 9999999)}`],
          ["Annual Premium", fmtMoney(int(800, 3400))],
          ["Effective Date", fmtDate(daysAgo(int(5, 30)))],
          ["Dwelling Coverage", fmtMoney(Math.round(amount * (0.95 + rand()*0.2)))],
          ["Policy Type", "POLICY (not binder)"]
        ]},
        "pc-3": { doc: "Hazard_DecPage.pdf", fields: [
          ["Deductible", fmtMoney(int(500, 5000))],
          ["Dwelling Coverage", fmtMoney(Math.round(amount * 1.03))],
          ["Rule", ctx.flags.isUSDAorBond ? "$1,000 or 1% of dwelling (USDA/Bond)" : "$5,000 or 5% of dwelling"],
          ["Result", "WITHIN LIMIT"],
          ["Paid-in-Full Receipt", "ATTACHED"]
        ]},
        "pc-2": { doc: "Prelim_Commitment.pdf + ID.pdf", fields: [
          ["Prelim Name", borrower],
          ["ID Name", borrower],
          ["Tolerance Match", "PASS"],
          ["Loan Amount (Prelim)", fmtMoney(amount)],
          ["Loan Amount (LQB)", fmtMoney(amount)],
          ["Loan Amount (Lock Confirmation)", fmtMoney(amount)],
          ["Title & Estate screen", "All fields present"]
        ]},
      };
      return map[item.id] || {
        doc: pick(["CPL_TitleCo.pdf","Prelim_Commitment.pdf","Hazard_DecPage.pdf","Flood_DecPage.pdf","Wire_Instructions.pdf","VOE_WorkNumber.pdf","USPS_AddressVerify.pdf"]),
        fields: [
          ["ADE check", item.label.split(" — ")[0]],
          ["Rule applied", item.rule.split(".")[0] + "."],
          ["Reference", item.ref],
          ["Result", pick(["PASS","PASS","PASS","REVIEW"])]
        ]
      };
    }

    function genExtraction(docType, ctx) {
      const base = {
        "1003 Loan Application": [
          ["Borrower", ctx.borrower, 0.992],
          ["Co-Borrower", ctx.coBorrower || "—", 0.984],
          ["Subject Property", `${ctx.property.street}, ${ctx.property.city}, ${ctx.property.state} ${ctx.property.zip}`, 0.988],
          ["Loan Amount", fmtMoney(ctx.amount), 0.996],
          ["Estimated Closing Date", fmtDate(ctx.fundingDate), 0.974]
        ],
        "W-2": [
          ["Employer", "Raytheon Technologies", 0.991],
          ["Box 1 Wages", fmtMoney(int(60000, 180000)), 0.993],
          ["Box 2 Fed WH", fmtMoney(int(8000, 32000)), 0.981],
          ["EIN", `${int(10,99)}-${int(1000000, 9999999)}`, 0.978]
        ],
        "CPL": [
          ["Mortgagee Clause", MORTGAGEE_CLAUSE, 0.997],
          ["Loan #", ctx.number, 0.995],
          ["Property", `${ctx.property.street}, ${ctx.property.city}, ${ctx.property.state}`, 0.991],
          ["Signed", "YES", 0.989]
        ],
        "Preliminary Title Report": [
          ["Vested Party", ctx.coBorrower ? `${ctx.borrower} and ${ctx.coBorrower}` : ctx.borrower, 0.987],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE, 0.995],
          ["Loan Amount", fmtMoney(ctx.amount), 0.992],
          ["Property", `${ctx.property.street}, ${ctx.property.city}, ${ctx.property.state}`, 0.988]
        ],
        "Hazard Dec Page": [
          ["Dwelling Coverage", fmtMoney(Math.round(ctx.amount * 1.02)), 0.991],
          ["Deductible", fmtMoney(int(500, 5000)), 0.988],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE, 0.994],
          ["Policy vs Binder", "POLICY", 0.993]
        ],
        "VOE (Work Number)": [
          ["Employer", "Banner Health", 0.99],
          ["Employment Status", "Active", 0.994],
          ["Start Date", fmtDate(daysAgo(int(365, 3000))), 0.978],
          ["YTD Earnings", fmtMoney(int(30000, 180000)), 0.984]
        ]
      };
      return base[docType] || [
        ["Doc Type", docType, 0.962],
        ["Borrower", ctx.borrower, 0.976],
        ["Loan #", ctx.number, 0.981],
        ["Pages Parsed", `${int(1,18)}`, 0.998]
      ];
    }

    /* Build 44 loans */
    const LOANS = (() => {
      const arr = [];
      for (let i = 0; i < 44; i++) arr.push(buildLoan(i));
      // force-inject diversity: ensure we have examples

        if (!arr.some(pred)) {

        }
      };
      ensure(l => l.flags.isVA_PUD, l => { l.product = "VA"; l.propertyType = "PUD"; l.flags.isVA_PUD = true; });

      ensure(l => l.flags.isRefi, l => { l.flags.isRefi = true; l.txnType = "Rate/Term Refi"; });
      return arr;
    })();

    function reducer(state, action) {
      switch (action.type) {
        case "NAV": return { ...state, section: action.section, selectedLoanId: action.loanId ?? state.selectedLoanId };
        case "TOGGLE_SIDEBAR": return { ...state, sidebarCollapsed: !state.sidebarCollapsed };
        case "SET_ENV": return { ...state, env: action.env };
        case "ADE_CONTROL":
          if (action.control === "start") return { ...state, adeRunning: true, adeStatus: "Active" };
          if (action.control === "pause") return { ...state, adeRunning: false, adeStatus: "Paused" };
          if (action.control === "stop") return { ...state, adeRunning: false, adeStatus: "Stopped", activityFeed: [] };
          return state;
        case "SET_SPEED": return { ...state, speed: action.speed };
        case "PUSH_EVENT": {
          const next = [action.event, ...state.activityFeed].slice(0, 80);
          return { ...state, activityFeed: next,
                   kpis: { ...state.kpis,
                     autoClearedToday: state.kpis.autoClearedToday + (action.event.kind === "ok" ? 1 : 0),
                     exceptionsOpen: state.kpis.exceptionsOpen + (action.event.kind === "warn" ? 1 : 0),
                     actionsPerMin: Math.max(12, Math.min(90, state.kpis.actionsPerMin + int(-2,3))),
                   } };
        }
        case "SELECT_LOAN": return { ...state, section: "pipeline-detail", selectedLoanId: action.id };
        case "BACK_TO_PIPELINE": return { ...state, section: "pipeline", selectedLoanId: null };
        case "SELECT_EMPLOYEE": return { ...state, selectedEmployeeId: action.id };
        case "TOAST": return { ...state, toast: action.toast };
        case "CLEAR_TOAST": return { ...state, toast: null };
        case "NEW_APPLICATION": return { ...state, kpis: { ...state.kpis, applicationsToday: state.kpis.applicationsToday + 1, loansInFlight: state.kpis.loansInFlight + 1 } };
        default: return state;

    const EXCEPTION_LIB = [
      { kind: "Hazard Deductible Exceeds Rule", severity: "warn", detail: "Deductible $6,000 exceeds $5,000 / 5% of dwelling rule", rule: "Closing Checklist item 3 — Hazard deductible ≤ $5,000 or 5% (USDA/Bond $1K/1%)", resolution: ["Request endorsement from insurance agent to lower deductible", "Upload amended dec page to Pre-Closing Folder", "Re-run checklist item 3"] },

    function buildExceptions() {
      const out = [];
      let i = 0;
      for (const l of LOANS) {
        if (out.length >= 14) break;
        const hasEsc = l.jp.some(x=>x.status==="escalated") || l.pc.some(x=>x.status==="escalated");
        if (!hasEsc) continue;
        const lib = EXCEPTION_LIB[i % EXCEPTION_LIB.length];
        i++;
        out.push({
          id: `exc-${l.number}-${i}`,
          loan: l,
          ...lib,
          opened: new Date(Date.now() - int(5, 180) * 60 * 1000)
        });
      }
      return out;
    }
    const EXCEPTIONS = buildExceptions();

    const ResolutionModal = ({ exception, onClose }) => {
      const { dispatch } = useApp();
      const [step, setStep] = useState(0);

      useEffect(() => {

        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(15, 23, 42, 0.45)" }}>

                  <Pill tone="navy" size="xs">#{loan.number}</Pill>

            </div>
            <div className="px-5 py-4 overflow-y-auto flex-1 space-y-4">

                  {exception.resolution.map((r, idx) => {

                      <div key={idx} className={`flex items-start gap-3 p-2.5 rounded-md border ${done?"bg-emerald-50 border-emerald-200":step===idx?"bg-white border-brand-navy":"bg-gray-50 border-gray-200"}`}>

                          <div className="text-sm text-gray-800">{r}</div>

      if (m === "Pre-Close") return "navy";
      if (m === "Clear to Close") return "success";
      return "neutral";
    };

    const LoanPipelineGrid = () => {
      const { dispatch } = useApp();
      const [query, setQuery] = useState("");
      const [milestone, setMilestone] = useState("all");
      const [product, setProduct] = useState("all");
      const [lo, setLo] = useState("all");
      const [sortCol, setSortCol] = useState("aging");
      const [sortDir, setSortDir] = useState("desc");

      const filtered = useMemo(() => {
        let arr = [...LOANS];
        if (query) {
          const q = query.toLowerCase();
          arr = arr.filter(l =>
            l.number.toLowerCase().includes(q) ||
            l.borrower.toLowerCase().includes(q) ||
            (l.coBorrower && l.coBorrower.toLowerCase().includes(q)) ||
            l.property.city.toLowerCase().includes(q) ||
            l.property.street.toLowerCase().includes(q) ||
            l.loanOfficer.toLowerCase().includes(q)
          );
        }
        if (milestone !== "all") arr = arr.filter(l => l.milestone === milestone);
        if (product !== "all") arr = arr.filter(l => l.product === product);
        if (lo !== "all") arr = arr.filter(l => l.loanOfficer === lo);
        const dir = sortDir === "asc" ? 1 : -1;
        arr.sort((a, b) => {
          let av, bv;
          if (sortCol === "aging") { av = ageOfLoan(a); bv = ageOfLoan(b); }
          else if (sortCol === "amount") { av = a.amount; bv = b.amount; }
          else if (sortCol === "ltv") { av = a.ltv; bv = b.ltv; }
          else if (sortCol === "milestone") { av = a.milestoneIdx; bv = b.milestoneIdx; }
          else if (sortCol === "borrower") { av = a.borrower; bv = b.borrower; }
          else { av = a.number; bv = b.number; }
          return av < bv ? -dir : av > bv ? dir : 0;
        });
        return arr;
      }, [query, milestone, product, lo, sortCol, sortDir]);

      const toggleSort = (col) => {
        if (sortCol === col) setSortDir(sortDir === "asc" ? "desc" : "asc");
        else { setSortCol(col); setSortDir("desc"); }
      };

      const SortTh = ({ col, children, align = "left" }) => (
        <th className={`px-3 py-2 text-${align} cursor-pointer hover:text-brand-navy-dark select-none`} onClick={()=>toggleSort(col)}>
          <span className="inline-flex items-center gap-1">
            {children}
            {sortCol === col ? (
              <Icon name={sortDir === "asc" ? "chevron-up" : "chevron-down"} size={12} className="brand-navy" />
            ) : (
              <Icon name="chevrons-up-down" size={12} className="text-gray-300" />
            )}
          </span>
        </th>
      );

      const loSet = Array.from(new Set(LOANS.map(l => l.loanOfficer))).sort();

      return (
        <div className="p-6 space-y-4">
          <Section eyebrow="Operations" title="Loan Pipeline"
            right={
              <div className="flex items-center gap-2">
                <Btn icon="download" size="sm" variant="ghost">Export</Btn>
                <Btn icon="plus" size="sm" variant="secondary">New loan</Btn>
              </div>
            }
          />

          <Card padding="p-3">
            <div className="flex items-center gap-2 flex-wrap">
              <div className="relative flex-1 min-w-[240px] max-w-md">
                <Icon name="search" size={14} className="text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" />
                <input value={query} onChange={e=>setQuery(e.target.value)}
                  placeholder="Search loan #, borrower, property, LO…"
                  className="w-full bg-gray-50 border border-gray-200 rounded-md pl-9 pr-3 py-1.5 text-sm focus:bg-white focus:outline-none focus:border-brand-navy" />
              </div>
              <Select label="Milestone" value={milestone} setValue={setMilestone} options={[["all","All milestones"], ...MILESTONES.map(m=>[m,m])]} />
              <Select label="Product" value={product} setValue={setProduct} options={[["all","All products"], ...PRODUCTS.map(p=>[p,p])]} />
              <Select label="Loan Officer" value={lo} setValue={setLo} options={[["all","All LOs"], ...loSet.map(l=>[l,l])]} />
              <div className="ml-auto text-xs text-gray-500 tabular-nums">
                Showing <span className="font-semibold text-gray-800">{filtered.length}</span> of {LOANS.length}
              </div>
            </div>
          </Card>

          <Card padding="p-0" className="overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full dense-table text-sm">
                <thead className="bg-gray-50 border-b border-gray-200 sticky top-0">
                  <tr>
                    <SortTh col="number">Loan #</SortTh>
                    <SortTh col="borrower">Borrower</SortTh>
                    <th className="px-3 py-2 text-left">Product</th>
                    <SortTh col="amount" align="right">Amount</SortTh>
                    <SortTh col="ltv" align="right">LTV</SortTh>
                    <SortTh col="milestone">Milestone</SortTh>
                    <th className="px-3 py-2 text-left">ADE Status</th>
                    <th className="px-3 py-2 text-left">Last Action</th>
                    <SortTh col="aging" align="right">Aging</SortTh>
                    <th className="px-3 py-2 text-left">Next Step</th>
                    <th className="px-3 py-2 w-6"></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 ? (
                    <tr>
                      <td colSpan={11} className="px-4 py-12 text-center">
                        <Icon name="search-x" size={28} className="text-gray-400 mx-auto mb-2" />
                        <div className="text-sm text-gray-700">No loans match your filters</div>
                        <button onClick={()=>{setQuery("");setMilestone("all");setProduct("all");setLo("all");}} className="text-xs brand-navy hover:underline mt-1">Clear filters</button>
                      </td>
                    </tr>
                  ) : filtered.map(l => {
                    const age = ageOfLoan(l);
                    const tone = ageTone(age);
                    const jpDone = l.jp.filter(x=>x.status==="verified").length;
                    const jpTotal = l.jp.filter(x=>x.status!=="n/a").length;
                    const pcDone = l.pc.filter(x=>x.status==="verified").length;
                    const pcTotal = l.pc.filter(x=>x.status!=="n/a").length;
                    return (
                      <tr key={l.number} className="border-b border-gray-100 last:border-0 hover:bg-gray-50 cursor-pointer"
                          onClick={()=>dispatch({type:"SELECT_LOAN", id: l.number})}>
                        <td className="px-3 py-2 font-mono text-xs brand-navy whitespace-nowrap">{l.number}</td>
                        <td className="px-3 py-2 whitespace-nowrap">
                          <div className="text-sm font-medium text-gray-800">{l.borrower}</div>
                          <div className="text-[11px] text-gray-500">{l.property.city}, {l.property.state}</div>
                        </td>
                        <td className="px-3 py-2">
                          <Pill tone="navy" size="xs">{l.product}</Pill>
                          {l.flags.isRefi && <Pill tone="neutral" size="xs" className="ml-1">Refi</Pill>}
                          {l.flags.isManufactured && <Pill tone="warn" size="xs" className="ml-1">Mfg</Pill>}
                          {l.flags.isVA_PUD && <Pill tone="warn" size="xs" className="ml-1">PUD</Pill>}
                        </td>
                        <td className="px-3 py-2 text-right tabular-nums whitespace-nowrap">{fmtMoney(l.amount)}</td>
                        <td className="px-3 py-2 text-right tabular-nums">
                          <span className={`${l.ltv>95?"text-amber-700":""}`}>{l.ltv}%</span>
                        </td>
                        <td className="px-3 py-2 whitespace-nowrap">
                          <Pill tone={milestoneTone(l.milestone)} size="xs">{l.milestone}</Pill>
                        </td>
                        <td className="px-3 py-2 whitespace-nowrap">
                          <div className="flex items-center gap-1.5">
                            {l.adeStatus === "Active" ? (
                              <><StatusDot tone="success" pulse size={7}/><span className="text-xs text-gray-700">Active</span></>
                            ) : l.adeStatus === "Awaiting Human" ? (
                              <><StatusDot tone="warn" size={7}/><span className="text-xs text-gray-700">Awaiting human</span></>
                            ) : (
                              <><StatusDot tone="mute" size={7}/><span className="text-xs text-gray-700">{l.adeStatus}</span></>
                            )}
                          </div>
                          <div className="text-[10px] text-gray-500 tabular-nums mt-0.5">
                            JP {jpDone}/{jpTotal} · CC {pcDone}/{pcTotal}
                          </div>
                        </td>
                        <td className="px-3 py-2 max-w-xs">
                          <div className="text-xs text-gray-700 truncate" title={l.lastAction}>{l.lastAction}</div>
                          <div className="text-[10px] text-gray-500">{fmtTime(l.lastActionTs)}</div>
                        </td>
                        <td className="px-3 py-2 text-right whitespace-nowrap">
                          <div className="inline-flex items-center gap-1.5">
                            <StatusDot tone={tone} size={7}/>
                            <span className={`text-xs tabular-nums ${tone==="danger"?"text-red-700 font-medium":tone==="warn"?"text-amber-700":"text-gray-700"}`}>{age}d</span>
                          </div>
                        </td>
                        <td className="px-3 py-2 text-xs text-gray-600 max-w-xs">
                          <div className="truncate" title={nextStepFor(l)}>{nextStepFor(l)}</div>
                        </td>
                        <td className="px-3 py-2"><Icon name="chevron-right" size={14} className="text-gray-400"/></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    };

    const Select = ({ label, value, setValue, options }) => (
      <div className="relative">
        <select value={value} onChange={e=>setValue(e.target.value)}
          className="appearance-none bg-white border border-gray-200 rounded-md pl-3 pr-8 py-1.5 text-sm hover:bg-gray-50 cursor-pointer focus:outline-none focus:border-brand-navy">
          {options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
        </select>
        <Icon name="chevron-down" size={12} className="text-gray-400 absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none" />
      </div>
    );

    /* ═════════════════════════════════════════════════════════════════════════════
       LOAN DETAIL — THE critical drill-down
    ═════════════════════════════════════════════════════════════════════════════ */

    /* Per-loan derived data cache — communications, AUS, timeline */
    const DETAIL_CACHE = new Map();
    function enrichLoan(loan) {
      if (DETAIL_CACHE.has(loan.number)) return DETAIL_CACHE.get(loan.number);
      const last5 = loan.number.slice(-5);

      /* Communications — email / SMS threads */
      const threads = [
        {
          id: `${loan.number}-thread-borrower`,
          kind: "email", participant: loan.borrower, topic: "Document Request — Paystubs",
          messages: [
            { from: "ADE", to: loan.borrower, channel: "email", ts: new Date(Date.now()-int(2,8)*3600*1000), subject: `Altitude Home Loans · Quick document request for loan #${last5}`, body: `Hi ${loan.borrower.split(" ")[0]},\n\nThis is Altitude's ADE concierge assisting your processor ${loan.processor}. We need your most recent paystubs covering 30 days to keep loan #${loan.number} on track.\n\nPlease upload via the secure portal link below. This takes about 2 minutes.\n\nThank you,\nAltitude Home Loans` , status: "Sent by ADE" },
            { from: loan.borrower, to: "ADE", channel: "email", ts: new Date(Date.now()-int(1,3)*3600*1000), subject: `Re: Altitude Home Loans · Quick document request`, body: `Attached. Let me know if you need anything else.\n— ${loan.borrower.split(" ")[0]}`, status: "Received" },
            { from: "ADE", to: loan.borrower, channel: "email", ts: new Date(Date.now()-int(15,60)*60*1000), subject: `Altitude Home Loans · Documents received`, body: `Hi ${loan.borrower.split(" ")[0]},\n\nWe received your paystubs. Both pages parsed and reconciled against your 1003. Condition #${int(1,8)} cleared.\n\nYou're good to go. We'll update you on the next milestone.\n\nAltitude Home Loans`, status: "Sent by ADE" }
          ]
        },
        {
          id: `${loan.number}-thread-lo`,
          kind: "email", participant: loan.loanOfficer, topic: "Status update",
          messages: [
            { from: "ADE", to: loan.loanOfficer, channel: "email", ts: new Date(Date.now()-int(4,12)*3600*1000), subject: `Status · ${loan.number}`, body: `Hi ${loan.loanOfficer.split(" ")[0]},\n\nLoan ${loan.number} (${loan.borrower}) — current milestone: ${loan.milestone}.\n\n• File Set-Up: ${loan.jp.filter(x=>x.status==="verified").length}/${loan.jp.filter(x=>x.status!=="n/a").length} items auto-verified\n• Closing: ${loan.pc.filter(x=>x.status==="verified").length}/${loan.pc.filter(x=>x.status!=="n/a").length} items auto-verified\n\nNo blockers.\n\n— Dynamic Loan Processor ADE`, status: "Sent by ADE" }
          ]
        },
        {
          id: `${loan.number}-thread-title`,
          kind: "email", participant: `${pick(["Pioneer","Stewart","First American","Chicago Title"])} Title — ${loan.property.city}`,
          topic: "Title documents",
          messages: [
            { from: "ADE", to: `title-${loan.property.city.toLowerCase()}@example.com`, channel: "email", ts: new Date(Date.now()-int(8,24)*3600*1000), subject: `Title Docs Request · Loan #${loan.number} · ${loan.borrower}`, body: `Good morning,\n\nPlease send the following for loan #${loan.number} (${loan.borrower}, ${loan.property.street}):\n• Preliminary Title Report\n• CPL with Altitude mortgagee clause: ${MORTGAGEE_CLAUSE}\n• Wire Instructions\n${loan.flags.isVA_PUD ? "• CC&Rs (VA + PUD)\n" : ""}${loan.flags.isManufactured ? "• Affidavit of Affixture (Manufactured Home)\n" : ""}\ncc: ${loan.processor} (processor)\n\nThank you,\nAltitude Home Loans`, status: "Sent by ADE" }
          ]
        },
        {
          id: `${loan.number}-thread-masterlist`,
          kind: "email", participant: "agents@altitudehomeloans.com", topic: "Master List submission",
          master: true,
          messages: [
            { from: "ADE", to: "agents@altitudehomeloans.com", channel: "email", ts: new Date(Date.now()-int(6,30)*3600*1000), subject: `Realtor Agent Added to Contact Master List — ${loan.borrower.split(" ").slice(-1)[0]}, #${last5}`, body: `Please add the following realtor to the Master List:\n\nName: ${pick(FIRST_NAMES)} ${pick(LAST_NAMES)}\nCompany: ${pick(["Long Realty","Tierra Antigua","Coldwell Banker","Realty Executives","Keller Williams"])}\nLicense #: ${int(500000, 899999)}\nPhone: (520) ${int(200,999)}-${int(1000,9999)}\nRole: Listing Agent\n\nAttachments: Wire Instructions, License copy\nLoan #: ${loan.number}\nBorrower: ${loan.borrower}`, status: rand()<0.5?"Sent by ADE":"Awaiting Human Approval" }
          ]
        },
        {
          id: `${loan.number}-thread-sms`,
          kind: "sms", participant: loan.borrower, topic: "Milestone update",
          messages: [
            { from: "ADE", to: loan.borrower, channel: "sms", ts: new Date(Date.now()-int(1,2)*3600*1000), body: `Altitude Home Loans: Great news, ${loan.borrower.split(" ")[0]} — your loan ${loan.number.slice(-5)} reached ${loan.milestone}. Est. close: ${fmtDate(loan.fundingDate)}. Reply STOP to opt out.`, status: "Sent by ADE" }
          ]
        }
      ];

      /* AUS findings */
      const aus = {
        du: {
          ran: new Date(Date.now() - int(6, 72) * 3600 * 1000),
          recommendation: loan.dti < 45 && loan.ltv < 95 ? "Approve/Eligible" : loan.dti < 50 ? "Approve/Eligible with Conditions" : "Refer with Caution",
          risk: loan.dti < 40 ? "Acceptable" : loan.dti < 48 ? "Moderate" : "Elevated",
          findings: [
            `Qualifying income: ${fmtMoney(Math.round(loan.amount / (loan.dti/100) / 12))}`,
            `DTI: ${loan.dti}% (front) · total backing within guideline`,
            `LTV: ${loan.ltv}% — ${loan.ltv > 80 ? "MI required" : "no MI"}`,
            `Reserves: ${int(2, 9)} months PITIA verified from Plaid-linked accounts`,
            `Credit: Tri-merge pulled ${fmtDate(daysAgo(int(3,21)))}; mid score ${int(640, 820)}`
          ]
        },
        lp: chance(0.35) ? {
          ran: new Date(Date.now() - int(12, 96) * 3600 * 1000),
          recommendation: "Accept",
          findings: [`LP run cross-check for ${loan.product === "FHA" ? "insuring dual eligibility" : "investor flexibility"}`, "No additional conditions generated beyond DU"]
        } : null
      };

      /* Timeline nodes across three phases */
      const phases = [
        { phase: "File Set-Up",
          nodes: [
            { label: "Intake", ref: "Internal" },
            { label: "App & Disclosures Split", ref: "LQB → Loan Application" },
            { label: "USPS & Tax Verify", ref: "LQB → This Loan Info" },
            { label: "Flood Cert", ref: "CoreLogic" },
            { label: "Agents Setup", ref: "LQB → Agents" },
            { label: "CPL + Prelim", ref: "Prelim Folder" },
            { label: "Wire Instructions", ref: "LQB → Agents; Master List" },
            { label: "Hazard / Flood Ins.", ref: "Pre-Closing Folder" },
            { label: "VOE Ordering", ref: "The Work Number" },
            { label: "Master List Submissions", ref: "agents@altitudehomeloans.com" },
            { label: "Conversation Log Entry", ref: "LQB → Internal Comments" }
          ]
        },
        { phase: "Processing",
          nodes: [
            { label: "OCR & Extraction", ref: "Doc AI" },
            { label: "Credit Review", ref: "CoreLogic" },
            { label: "Income Calc (B3-3.1)", ref: "Internal" },
            { label: "Asset Review (VOA)", ref: "Plaid" },
            { label: "Appraisal Order", ref: "AMC" },
            { label: "AUS Run (DU / LP)", ref: "Fannie / Freddie" },
            { label: "Condition Management", ref: "LQB" },
            { label: "UW Submission", ref: "LQB" }
          ]
        },
        { phase: "Pre-Close",
          nodes: [
            { label: "CPL Verify", ref: "Pre-Closing Folder" },
            { label: "Prelim / Title Commitment Verify", ref: "Prelim Folder; LQB → Title & Estate" },
            { label: "Hazard Verify", ref: "Pre-Closing Folder" },
            { label: "Title License", ref: "LQB → Agents" },
            { label: "Flood", ref: "Pre-Closing Folder" },
            { label: "MI Cert", ref: "LQB → This Loan Info" },
            { label: "Fees in LQB", ref: "Pre-Closing > Invoices" },
            { label: "VVOE", ref: "Pre-Closing > VOE 1/2/3" },
            { label: "PUD / Lock / PITIA Misc", ref: "LQB; Lock Confirmation" },
            { label: "Uploads (Wire / Doc Request / Final LE+COC / ICD)", ref: "Pre-Closing; Disclosure Center" },
            { label: "CTC", ref: "LQB" }
          ]
        }
      ];
      // Mark node state based on milestoneIdx and progress
      const phaseCaps = { "File Set-Up": 1, "Processing": 4, "Pre-Close": 7 };
      phases.forEach(p => {
        const progress = loan.milestoneIdx >= phaseCaps[p.phase] + (p.nodes.length) ? 1 :
                         loan.milestoneIdx < phaseCaps[p.phase] ? 0 :
                         (loan.milestoneIdx - phaseCaps[p.phase]) / p.nodes.length;
        const inProgIdx = Math.min(p.nodes.length - 1, Math.floor(progress * p.nodes.length));
        p.nodes.forEach((n, i) => {
          if (i < inProgIdx) { n.state = "done"; n.ts = new Date(Date.now() - int(24, 96) * 3600 * 1000 + i * 2 * 3600 * 1000); }
          else if (i === inProgIdx) { n.state = progress >= 1 ? "done" : "in-progress"; n.ts = progress >= 1 ? new Date() : null; }
          else { n.state = "pending"; n.ts = null; }
        });
        // Sprinkle a blocked for realism
        if (chance(0.12)) { p.nodes[int(0, p.nodes.length - 1)].state = "blocked"; }
      });

      /* Conversation Log — mirrors LQB Internal Comments with ADE + human entries */
      const conversationLog = [
        { ts: loan.applicationDate, actor: "ADE", category: "Processor", text: `File set-up completed. Application split and classified. USPS address verified against This Loan Info screen. Agents populated. Checklist uploaded to Processor Requests Doc Type.` },
        { ts: new Date(loan.applicationDate.getTime() + 2 * 3600 * 1000), actor: "ADE", category: "Processor", text: `CPL received from Title Co. Mortgagee clause matches verbatim. Within 60 days of funding.` },
        { ts: new Date(loan.applicationDate.getTime() + 4 * 3600 * 1000), actor: "Human", category: "Processor", text: `JP Alvarez: Confirmed earnest money on contract matches 1003.` },
        { ts: new Date(loan.applicationDate.getTime() + 26 * 3600 * 1000), actor: "ADE", category: "Processor", text: `VOEs ordered from The Work Number for both borrower and co-borrower. Processor copied.` },
        { ts: new Date(loan.applicationDate.getTime() + 48 * 3600 * 1000), actor: "ADE", category: "Processor", text: `Prelim received. Borrower names and vesting verified. Altitude mortgagee clause present and correct. Uploaded to Prelim Folder.` },
        ...(loan.flags.isVA_PUD ? [{ ts: new Date(loan.applicationDate.getTime() + 52 * 3600 * 1000), actor: "ADE", category: "Processor", text: `VA + PUD detected. CC&Rs ordered from Title. Will chain into Prelim Folder behind prelim and plat map on receipt.` }] : []),
        ...(loan.flags.isManufactured ? [{ ts: new Date(loan.applicationDate.getTime() + 60 * 3600 * 1000), actor: "ADE", category: "Processor", text: `Manufactured home. Affidavit of Affixture requested from Title.` }] : []),
        { ts: new Date(Date.now() - int(6, 48) * 3600 * 1000), actor: "ADE", category: "Processor", text: `Condition #${int(1, 8)} cleared — matched against paystubs (both pages, 30 days covered). Continuing.` }
      ].sort((a,b) => b.ts - a.ts);

      const enriched = { threads, aus, phases, conversationLog };
      DETAIL_CACHE.set(loan.number, enriched);
      return enriched;
    }

    /* ─── Loan Detail Header ─────────────────────────────────────────────────── */
    const LoanDetailHeader = ({ loan, onBack, paused, setPaused }) => {
      const { dispatch } = useApp();
      const jpVerified = loan.jp.filter(x=>x.status==="verified").length;
      const jpTotal = loan.jp.filter(x=>x.status!=="n/a").length;
      const pcVerified = loan.pc.filter(x=>x.status==="verified").length;
      const pcTotal = loan.pc.filter(x=>x.status!=="n/a").length;
      const condCleared = loan.conditions.filter(c=>c.status==="Cleared by ADE" || c.status==="Human Cleared").length;
      const age = ageOfLoan(loan);

      return (
        <div className="space-y-3">
          <div className="flex items-center gap-2 text-xs text-gray-500">
            <button onClick={onBack} className="hover:text-brand-navy">Loan Pipeline</button>
            <Icon name="chevron-right" size={12} />
            <span className="font-mono brand-navy">{loan.number}</span>
            <Icon name="chevron-right" size={12} />
            <span className="text-gray-700 font-medium">{loan.borrower}</span>
          </div>

          <Card padding="p-5">
            <div className="flex items-start gap-5">
              <div className="shrink-0 w-12 h-12 rounded-lg bg-brand-navy-50 border border-brand-navy-100 flex items-center justify-center">
                <Icon name="home" size={24} className="brand-navy" />
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap mb-1">
                  <h1 className="text-xl font-semibold brand-navy">{loan.borrower}</h1>
                  {loan.coBorrower && <span className="text-sm text-gray-500">& {loan.coBorrower}</span>}
                  <Pill tone={milestoneTone(loan.milestone)} size="sm">{loan.milestone}</Pill>
                  <Pill tone="navy" size="xs">{loan.product}</Pill>
                  {loan.flags.isRefi && <Pill tone="neutral" size="xs">{loan.txnType}</Pill>}
                  {loan.flags.isVA_PUD && <Pill tone="warn" size="xs">VA + PUD</Pill>}
                  {loan.flags.isManufactured && <Pill tone="warn" size="xs">Manufactured</Pill>}
                  {loan.flags.isCondo && <Pill tone="neutral" size="xs">Condo</Pill>}
                  {loan.flags.hasPOA && <Pill tone="neutral" size="xs">POA</Pill>}
                  {loan.flags.hasTrust && <Pill tone="neutral" size="xs">Trust</Pill>}
                  {loan.flags.hasTitleOnly && <Pill tone="neutral" size="xs">Title Only</Pill>}

              {loan.documents.map(d => (

                    <div className="flex-1 min-w-0">
