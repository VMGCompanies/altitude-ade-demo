                        <div className="text-sm font-medium text-gray-800 truncate">{d.type}</div>
                        <span className={`text-[10px] tabular-nums shrink-0 ${d.classifierConfidence>0.95?"text-emerald-700":"text-amber-700"}`}>
                          {(d.classifierConfidence*100).toFixed(1)}%
                        </span>
                      </div>
                      <div className="text-[11px] text-gray-500 truncate">{d.filename}</div>
                      <div className="flex items-center gap-2 mt-1 flex-wrap">
                        <Pill tone={d.handledBy==="ADE"?"navy":"mute"} size="xs">{d.handledBy==="ADE"?"ADE":"Human"}</Pill>
                        <Pill tone={d.status==="Verified"?"success":d.status==="Escalated"?"warn":"neutral"} size="xs">{d.status}</Pill>
                        <span className="text-[10px] text-gray-400">{d.pages}p · OCR {d.ocrQuality}</span>
                      </div>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </Card>

          <Card padding="p-0" className="lg:col-span-3 overflow-hidden">
            {doc ? (
              <Fragment>
                <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
                  <div>
                    <div className="flex items-center gap-2">
                      <div className="text-sm font-semibold brand-navy">{doc.type}</div>
                      <Pill tone="navy" size="xs">{doc.handledBy==="ADE"?"ADE-handled":"Human"}</Pill>
                      <Pill tone={doc.status==="Verified"?"success":"warn"} size="xs">{doc.status}</Pill>
                    </div>
                    <div className="text-[11px] text-gray-500 font-mono mt-0.5">{doc.filename}</div>
                  </div>
                  <div className="flex items-center gap-1">
                    <Btn variant="ghost" size="sm" icon="eye" onClick={()=>dispatch({type:"TOAST",toast:"Full extraction viewer arrives in Phase 4"})}>View extraction</Btn>
                    <Btn variant="ghost" size="sm" icon="download" onClick={()=>{}}>Download</Btn>
                  </div>
                </div>
                <div className="p-4 grid grid-cols-2 gap-4 bg-gray-50 border-b border-gray-200">
                  <div>
                    <div className="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">Source</div>
                    <div className="text-sm text-gray-800">{doc.source}</div>
                  </div>
                  <div>
                    <div className="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">Uploaded</div>
                    <div className="text-sm text-gray-800">{fmtDateTime(doc.uploaded)}</div>
                  </div>
                  <div>
                    <div className="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">Pages · fields</div>
                    <div className="text-sm text-gray-800">{doc.pages} pages · {doc.fields} fields extracted</div>
                  </div>
                  <div>
                    <div className="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">OCR quality</div>
                    <div className="text-sm text-gray-800">{doc.ocrQuality}</div>
                  </div>
                </div>
                <div className="p-4">
                  <div className="text-[11px] uppercase tracking-wider text-gray-500 font-semibold mb-2">Extracted fields</div>
                  <div className="bg-white border border-gray-200 rounded-md overflow-hidden">
                    <table className="w-full text-sm">
                      <tbody>
                        {doc.extracted.map((f, i) => (
                          <tr key={i} className="border-b border-gray-100 last:border-0">
                            <td className="px-3 py-2 text-xs text-gray-500 w-1/3">{f[0]}</td>
                            <td className="px-3 py-2 text-sm text-gray-800 font-mono">{f[1]}</td>
                            <td className="px-3 py-2 text-right w-24">
                              <span className={`text-xs tabular-nums ${f[2]>0.98?"text-emerald-700":f[2]>0.9?"text-gray-600":"text-amber-700"}`}>
                                {(f[2]*100).toFixed(1)}%
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </Fragment>
            ) : <div className="p-8 text-center text-sm text-gray-500">Select a document to view extraction</div>}
          </Card>
        </div>
      );
    };

    /* ─── Timeline tab ───────────────────────────────────────────────────────── */
    const TimelineTab = ({ loan }) => {
      const { phases } = enrichLoan(loan);
      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
          {phases.map(p => (
            <Card key={p.phase} padding="p-4">
              <div className="flex items-center justify-between mb-3">
                <div className="text-sm font-semibold brand-navy">{p.phase}</div>
                <Pill tone="navy" size="xs">{p.nodes.filter(n=>n.state==="done").length}/{p.nodes.length}</Pill>
              </div>
              <div className="relative pl-4">
                <div className="absolute left-[7px] top-1 bottom-1 w-0.5 bg-gray-200" />
                {p.nodes.map((n, i) => {
                  const color = n.state==="done"?"bg-emerald-500 border-emerald-500":
                                 n.state==="in-progress"?"bg-white border-brand-navy":
                                 n.state==="blocked"?"bg-red-500 border-red-500":
                                 "bg-white border-gray-300";
                  const icon = n.state==="done"?"check":n.state==="in-progress"?"loader":n.state==="blocked"?"x":null;
                  return (
                    <div key={i} className="relative flex items-start gap-2.5 pb-3 last:pb-0">
                      <div className={`shrink-0 w-3.5 h-3.5 rounded-full border-2 ${color} flex items-center justify-center ${n.state==="in-progress"?"pulse-dot":""} z-10`}
                        style={{ marginLeft: -10 }}>
                        {icon && <Icon name={icon} size={8} className={n.state==="in-progress"?"brand-navy":"text-white"} strokeWidth={3} />}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className={`text-xs ${n.state==="done"?"text-gray-700":n.state==="in-progress"?"font-semibold brand-navy":n.state==="blocked"?"text-red-700":"text-gray-500"}`}>
                          {n.label}
                        </div>
                        <div className="text-[10px] text-gray-400">{n.ref}</div>
                        {n.state === "in-progress" && <div className="text-[10px] brand-navy font-medium mt-0.5">In progress now</div>}
                        {n.state === "blocked" && <div className="text-[10px] text-red-700 font-medium mt-0.5">Blocked — escalated</div>}
                        {n.ts && n.state === "done" && <div className="text-[10px] text-gray-400">{fmtDateTime(n.ts)}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          ))}
        </div>
      );
    };

    /* ─── Conditions tab ─────────────────────────────────────────────────────── */
    const ConditionsTab = ({ loan }) => {
      const { dispatch } = useApp();
      const [filter, setFilter] = useState("all");
      const counts = {
        all: loan.conditions.length,
        outstanding: loan.conditions.filter(c=>c.status==="Outstanding").length,
        cleared: loan.conditions.filter(c=>c.status==="Cleared by ADE"||c.status==="Human Cleared").length,
        escalated: loan.conditions.filter(c=>c.status==="Escalated").length,
        ptd: loan.conditions.filter(c=>c.tag==="PTD").length,
        ptf: loan.conditions.filter(c=>c.tag==="PTF").length
      };
      const visible = loan.conditions.filter(c => {
        if (filter === "all") return true;
        if (filter === "outstanding") return c.status === "Outstanding";
        if (filter === "cleared") return c.status === "Cleared by ADE" || c.status === "Human Cleared";
        if (filter === "escalated") return c.status === "Escalated";
        if (filter === "ptd") return c.tag === "PTD";
        if (filter === "ptf") return c.tag === "PTF";
        return true;
      });

      const statusPill = (s) => {
        if (s === "Cleared by ADE") return { tone: "success", icon: "bot" };
        if (s === "Human Cleared") return { tone: "success", icon: "user-check" };
        if (s === "Escalated") return { tone: "warn", icon: "alert-triangle" };
        if (s === "Submitted to UW") return { tone: "info", icon: "send" };
        return { tone: "neutral", icon: "clock" };
      };

      return (
        <Card padding="p-0" className="overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <Icon name="clipboard-list" size={16} className="brand-navy" />
              <div className="text-sm font-semibold brand-navy">Conditions Tracker</div>
              <Pill tone="navy" size="xs">{counts.all} total</Pill>
              <Pill tone="success" size="xs">{counts.cleared} cleared</Pill>
              <Pill tone="warn" size="xs">{counts.outstanding} outstanding</Pill>
            </div>
            <div className="flex items-center gap-1 bg-gray-50 border border-gray-200 rounded-md p-0.5">
              {[
                ["all",`All (${counts.all})`],
                ["outstanding",`Outstanding (${counts.outstanding})`],
                ["cleared",`Cleared (${counts.cleared})`],
                ["escalated",`Escalated (${counts.escalated})`],
                ["ptd",`PTD (${counts.ptd})`],
                ["ptf",`PTF (${counts.ptf})`]
              ].map(([v,l]) => (
                <button key={v} onClick={()=>setFilter(v)}
                  className={`text-[11px] px-2 py-1 rounded ${filter===v?"bg-white border border-gray-300 font-semibold brand-navy":"text-gray-600 hover:bg-white"}`}>
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div>
            {visible.length === 0 ? (
              <div className="p-8 text-center text-sm text-gray-500">No conditions match this filter</div>
            ) : visible.map(c => {
              const sp = statusPill(c.status);
              return (
                <div key={c.id} className="px-4 py-3 border-b border-gray-100 last:border-0 hover:bg-gray-50">
                  <div className="flex items-start gap-3">
                    <div className="w-7 shrink-0 text-xs tabular-nums text-gray-400 font-semibold pt-0.5">#{c.idx}</div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm text-gray-800 leading-snug">{c.text}</div>
                      <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                        <Pill tone={c.tag==="PTD"?"navy":"warn"} size="xs">{c.tag}</Pill>
                        <Pill tone="neutral" size="xs">{c.source}</Pill>
                        <Pill tone={sp.tone} size="xs"><Icon name={sp.icon} size={10}/> {c.status}</Pill>
                        {c.clearedAt && <span className="text-[11px] text-gray-500">cleared {fmtDateTime(c.clearedAt)}</span>}
                      </div>
                      {c.reasoning && (
                        <div className="mt-2 p-2 bg-emerald-50 border border-emerald-100 rounded text-[11px] text-emerald-900">
                          <span className="font-semibold">ADE reasoning:</span> {c.reasoning}
                        </div>
                      )}
                    </div>
                    <div className="flex items-center gap-1 shrink-0">
                      {c.status === "Outstanding" && <Btn variant="secondary" size="sm" icon="refresh-cw" onClick={()=>dispatch({type:"TOAST",toast:"ADE re-evaluating condition"})}>Re-run</Btn>}
                      {c.status === "Outstanding" && <Btn variant="ghost" size="sm" icon="user-check" onClick={()=>dispatch({type:"TOAST",toast:`Condition #${c.idx} marked cleared by human`})}>Clear</Btn>}
                      {c.status === "Escalated" && <Btn variant="ghost" size="sm" icon="eye" onClick={()=>{}}>Review</Btn>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      );
    };

    /* ─── Communications tab ─────────────────────────────────────────────────── */
    const CommunicationsTab = ({ loan }) => {
      const { threads } = enrichLoan(loan);
      const [selected, setSelected] = useState(threads[0]?.id);
      const thread = threads.find(t => t.id === selected);

      return (
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
          <Card padding="p-0" className="lg:col-span-2 overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Icon name="mail" size={16} className="brand-navy" />
                <div className="text-sm font-semibold brand-navy">Threads</div>
              </div>
              <span className="text-[11px] text-gray-500">{threads.length}</span>
            </div>
            <div className="max-h-[640px] overflow-y-auto">
              {threads.map(t => (
                <button key={t.id} onClick={()=>setSelected(t.id)}
                  className={`w-full text-left px-4 py-2.5 border-b border-gray-100 hover:bg-gray-50 ${selected===t.id?"bg-brand-navy-50":""}`}>
                  <div className="flex items-start gap-2">
                    <Icon name={t.kind==="email"?"mail":"message-circle"} size={14} className="text-gray-500 mt-0.5 shrink-0" />
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between gap-2">
                        <div className="text-sm font-medium text-gray-800 truncate">{t.topic}</div>
                        {t.master && <Pill tone="navy" size="xs">Master List</Pill>}
                      </div>
                      <div className="text-[11px] text-gray-500 truncate">{t.participant}</div>
                      <div className="flex items-center gap-2 mt-1">
                        <span className="text-[10px] text-gray-400">{t.messages.length} msg</span>
                        <span className="text-[10px] text-gray-400">· {fmtDateTime(t.messages[t.messages.length-1].ts)}</span>
                      </div>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </Card>

          <Card padding="p-0" className="lg:col-span-3 overflow-hidden">
            {thread ? (
              <Fragment>
                <div className="px-4 py-3 border-b border-gray-200">
                  <div className="flex items-center gap-2 mb-1">
                    <div className="text-sm font-semibold brand-navy">{thread.topic}</div>
                    <Pill tone="neutral" size="xs">{thread.kind === "email" ? "Email" : "SMS"}</Pill>
                    {thread.master && <Pill tone="navy" size="xs">Master List submission</Pill>}
                  </div>
                  <div className="text-[11px] text-gray-500">{thread.participant}</div>
                </div>
                <div className="p-4 space-y-3 max-h-[580px] overflow-y-auto">
                  {thread.messages.map((m, i) => {
                    const fromAde = m.from === "ADE";
                    return (
                      <div key={i} className={`flex ${fromAde?"":"justify-end"}`}>
                        <div className={`max-w-[85%] ${fromAde?"":"items-end"}`}>
                          <div className="flex items-center gap-2 mb-1">
                            {fromAde ? (
                              <><div className="w-5 h-5 rounded-full bg-brand-navy flex items-center justify-center"><Icon name="bot" size={10} className="text-white"/></div>
                                <span className="text-[11px] font-semibold text-brand-navy-dark">ADE</span></>
                            ) : (
                              <><span className="text-[11px] font-semibold text-gray-700">{typeof m.from === "string" ? m.from : "Participant"}</span>
                                <div className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center"><Icon name="user" size={10} className="text-gray-500"/></div></>
                            )}
                            <span className="text-[10px] text-gray-400">{fmtDateTime(m.ts)}</span>
                            <Pill tone={m.status==="Sent by ADE"?"success":m.status==="Awaiting Human Approval"?"warn":m.status==="Received"?"info":"neutral"} size="xs">
                              {m.status}
                            </Pill>
                          </div>
                          <div className={`border rounded-md p-3 ${fromAde?"bg-brand-navy-50 border-brand-navy-100":"bg-white border-gray-200"}`}>
                            {m.subject && <div className="text-xs font-semibold brand-navy-dark mb-2">{m.subject}</div>}
                            <div className="text-xs text-gray-800 whitespace-pre-wrap">{m.body}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Fragment>
            ) : <div className="p-8 text-center text-sm text-gray-500">Select a thread</div>}
          </Card>
        </div>
      );
    };

    /* ─── Decision Log & Conversation Log ────────────────────────────────────── */
    const DecisionsTab = ({ loan }) => {
      const { conversationLog } = enrichLoan(loan);
      return (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <Card padding="p-0" className="overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Icon name="scroll-text" size={16} className="brand-navy" />
                <div className="text-sm font-semibold brand-navy">Decision Log</div>
                <Pill tone="navy" size="xs">{loan.history.length} entries</Pill>
              </div>
              <Btn variant="ghost" size="sm" icon="download" onClick={()=>{}}>Export</Btn>
            </div>
            <div className="max-h-[600px] overflow-y-auto">
              {loan.history.slice(0, 40).map(h => (
                <div key={h.id} className="px-4 py-2.5 border-b border-gray-100 last:border-0">
                  <div className="flex items-start gap-2">
                    <div className="shrink-0 mt-0.5">
                      {h.actor.startsWith("ADE") ? (
                        <div className="w-5 h-5 rounded-full bg-brand-navy flex items-center justify-center"><Icon name="bot" size={10} className="text-white"/></div>
                      ) : (
                        <div className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center"><Icon name="user" size={10} className="text-gray-500"/></div>
                      )}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-xs text-gray-800">{h.message}</div>
                      <div className="flex items-center gap-2 mt-0.5">
                        <span className="text-[10px] text-gray-500">{fmtDateTime(h.ts)}</span>
                        <span className="text-[10px] text-gray-400">· {h.actor.replace("ADE: ","").replace("Human: ","")}</span>
                        {h.confidence && <span className={`text-[10px] tabular-nums ${h.confidence>0.92?"text-emerald-700":"text-amber-700"}`}>· {(h.confidence*100).toFixed(1)}%</span>}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </Card>

          <Card padding="p-0" className="overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Icon name="message-square" size={16} className="brand-navy" />
                <div className="text-sm font-semibold brand-navy">Conversation Log</div>
                <Pill tone="mute" size="xs">mirrors LQB → Internal Comments</Pill>
              </div>
              <Btn variant="ghost" size="sm" icon="plus" onClick={()=>{}}>Add entry</Btn>
            </div>
            <div className="max-h-[600px] overflow-y-auto">
              {conversationLog.map((c, i) => (
                <div key={i} className="px-4 py-3 border-b border-gray-100 last:border-0">
                  <div className="flex items-center gap-2 mb-1">
                    <Pill tone={c.actor === "ADE" ? "navy" : "neutral"} size="xs">
                      <Icon name={c.actor === "ADE" ? "bot" : "user"} size={10} />
                      {c.actor}
                    </Pill>
                    <Pill tone="mute" size="xs">Category: {c.category}</Pill>
                    <span className="text-[10px] text-gray-400 ml-auto">{fmtDateTime(c.ts)}</span>
                  </div>
                  <div className="text-xs text-gray-800 leading-relaxed">{c.text}</div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    };

    /* ─── Loan Detail container ──────────────────────────────────────────────── */
    const LoanDetail = () => {
      const { state, dispatch } = useApp();
      const loan = LOANS.find(l => l.number === state.selectedLoanId);
      const [tab, setTab] = useState("checklist");
      const [paused, setPaused] = useState(false);

      if (!loan) return (
        <div className="p-6">
          <Card>
            <div className="text-center py-8">
              <Icon name="file-x" size={28} className="text-gray-400 mx-auto mb-2" />
              <div className="text-sm text-gray-700 font-medium">Loan not found</div>
              <Btn variant="secondary" size="sm" className="mt-3" onClick={()=>dispatch({type:"NAV", section:"pipeline"})}>Back to pipeline</Btn>
            </div>
          </Card>
        </div>
      );

      const tabs = [
        { id: "checklist", label: "Checklists", icon: "list-checks", badge: loan.jp.filter(x=>x.status==="escalated").length + loan.pc.filter(x=>x.status==="escalated").length },
        { id: "data", label: "1003 & Data", icon: "file-text" },
        { id: "documents", label: "Documents", icon: "folder-open", badge: null, count: loan.documents.length },
        { id: "timeline", label: "Timeline", icon: "git-branch" },
        { id: "conditions", label: "Conditions", icon: "clipboard-list", count: loan.conditions.filter(c=>c.status==="Outstanding").length, countTone: "warn" },
        { id: "comms", label: "Communications", icon: "mail" },
        { id: "decisions", label: "Decisions & Log", icon: "scroll-text" }
      ];

      return (
        <div className="p-6 space-y-4">
          <LoanDetailHeader loan={loan} onBack={()=>dispatch({type:"NAV", section:"pipeline"})} paused={paused} setPaused={setPaused} />

          <div className="border-b border-gray-200 flex items-center gap-0 overflow-x-auto">
            {tabs.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`flex items-center gap-1.5 px-3 py-2 text-sm border-b-2 transition-colors whitespace-nowrap ${tab===t.id?"border-brand-navy text-brand-navy-dark font-semibold":"border-transparent text-gray-600 hover:text-gray-900"}`}>
                <Icon name={t.icon} size={14} />
                {t.label}
                {t.badge > 0 && <span className="text-[10px] bg-amber-100 text-amber-800 rounded-full px-1.5 py-0 font-semibold">{t.badge}</span>}
                {t.count > 0 && <span className={`text-[10px] rounded-full px-1.5 py-0 font-semibold ${t.countTone==="warn"?"bg-amber-100 text-amber-800":"bg-gray-100 text-gray-700"}`}>{t.count}</span>}
              </button>
            ))}
          </div>

          {tab === "checklist" && <ChecklistTab loan={loan} />}
          {tab === "data" && <LoanDataTab loan={loan} />}
          {tab === "documents" && <DocumentsTab loan={loan} />}
          {tab === "timeline" && <TimelineTab loan={loan} />}
          {tab === "conditions" && <ConditionsTab loan={loan} />}
          {tab === "comms" && <CommunicationsTab loan={loan} />}
          {tab === "decisions" && <DecisionsTab loan={loan} />}
        </div>
      );
    };

    const LoanPipeline = () => {
      const { state } = useApp();
      if (state.section === "pipeline-detail") return <LoanDetail />;
      return <LoanPipelineGrid />;
    };
    /* ═════════════════════════════════════════════════════════════════════════════
       WORKFLOWS — DAG canvas + Playbooks reference
    ═════════════════════════════════════════════════════════════════════════════ */
    const WORKFLOW_PHASES = [
      {
        phase: "File Set-Up",
        desc: "JP Checklist execution — from intake through Conversation Log entry",

    /* ═════════════════════════════════════════════════════════════════════════════

    // Flatten all docs across all loans, with loan reference attached
    const ALL_DOCS = LOANS.flatMap(l => l.documents.map(d => ({ ...d, loan: l })));
    const DOC_TYPES_IN_USE = Array.from(new Set(ALL_DOCS.map(d => d.type))).sort();

    const DocumentExtractionViewer = ({ doc, onClose }) => {
      const [hoverField, setHoverField] = useState(null);
      const [editingField, setEditingField] = useState(null);
      const [edits, setEdits] = useState({});
      const { dispatch } = useApp();

      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [onClose]);

      if (!doc) return null;

      // Generate deterministic bounding-box positions per field
      const fieldLayouts = doc.extracted.map((f, i) => {
        const seed = (doc.id || "d").length + i;
        const r = (n) => ((seed * 9301 + 49297 + n*131) % 1000) / 1000;
        // Place in vertical bands
        const band = i % 5;
        return {
          top: 18 + band * 14 + r(1) * 3,
          left: 8 + ((i % 2) * 44) + r(2) * 4,
          width: 34 + r(3) * 10,
          height: 4 + r(4) * 2
        };
      });

      const save = (idx) => {
        if (edits[idx] !== undefined) {
          dispatch({ type: "TOAST", toast: "Field corrected · audit trail updated" });
        }
        setEditingField(null);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(15, 23, 42, 0.55)" }}>
          <div className="bg-white rounded-lg border border-gray-200 shadow-2xl w-full flex flex-col fade-in-up" style={{ maxWidth: 1200, maxHeight: "92vh" }}>
            <div className="px-5 py-3 border-b border-gray-200 flex items-center justify-between">
              <div>
                <div className="flex items-center gap-2 mb-0.5">
                  <Pill tone="navy" size="xs">{doc.type}</Pill>
                  <Pill tone={doc.handledBy==="ADE"?"success":"mute"} size="xs">{doc.handledBy==="ADE"?"ADE-handled":"Human"}</Pill>
                  <Pill tone={doc.status==="Verified"?"success":doc.status==="Escalated"?"warn":"neutral"} size="xs">{doc.status}</Pill>
                  <span className="text-[11px] text-gray-500">Loan {doc.loan.number} · {doc.loan.borrower}</span>
                </div>
                <div className="text-sm font-semibold brand-navy font-mono">{doc.filename}</div>
              </div>
              <div className="flex items-center gap-1">
                <Btn variant="ghost" size="sm" icon="download">Download</Btn>
                <Btn variant="ghost" size="sm" icon="external-link" onClick={()=>{ dispatch({type:"SELECT_LOAN", id: doc.loan.number}); onClose(); }}>Open loan</Btn>
                <button onClick={onClose} className="p-1.5 hover:bg-gray-100 rounded"><Icon name="x" size={16}/></button>
              </div>
            </div>
            <div className="flex-1 overflow-hidden grid grid-cols-1 lg:grid-cols-5 gap-0">
              {/* Document preview */}
              <div className="lg:col-span-3 bg-gray-100 overflow-y-auto p-6 border-r border-gray-200" style={{ maxHeight: "calc(92vh - 130px)" }}>
                <div className="mx-auto bg-white shadow-lg rounded relative" style={{ maxWidth: 560, aspectRatio: "8.5/11" }}>
                  {/* Fake document chrome */}
                  <div className="p-6 border-b border-gray-200 text-center">
                    <div className="h-3 bg-gray-200 rounded w-2/3 mx-auto mb-2" />
                    <div className="h-2 bg-gray-100 rounded w-1/2 mx-auto" />
                  </div>
                  <div className="p-6 space-y-2">
                    {[...Array(12)].map((_, i) => (
                      <div key={i} className="flex gap-2">
                        <div className="h-2 bg-gray-100 rounded" style={{ width: `${10 + (i*13)%45}%` }} />
                        <div className="h-2 bg-gray-100 rounded flex-1" />
                      </div>
                    ))}
                    <div className="h-2"></div>
                    {[...Array(4)].map((_, i) => (
                      <div key={i} className="flex gap-2">
                        <div className="h-2 bg-gray-100 rounded w-1/4" />
                        <div className="h-2 bg-gray-100 rounded flex-1" />
                      </div>
                    ))}
                  </div>

                  {/* Bounding boxes */}
                  {fieldLayouts.map((b, i) => {
                    const field = doc.extracted[i];
                    const conf = field[2];
                    const tone = conf > 0.98 ? "#10b981" : conf > 0.9 ? "#1E3A6B" : "#f59e0b";
                    const highlighted = hoverField === i;
                    return (
                      <div key={i}
                        onMouseEnter={()=>setHoverField(i)}
                        onMouseLeave={()=>setHoverField(null)}
                        onClick={()=>setEditingField(i)}
                        style={{
                          position: "absolute",
                          top: `${b.top}%`,
                          left: `${b.left}%`,
                          width: `${b.width}%`,
                          height: `${b.height}%`,
                          border: `2px solid ${tone}`,
                          background: highlighted ? `${tone}33` : `${tone}10`,
                          borderRadius: 3,
                          cursor: "pointer",
                          transition: "all 0.15s ease"
                        }}
                        title={`${field[0]}: ${field[1]}`}
                      >
                        <div className="absolute -top-5 left-0 text-[9px] font-semibold tabular-nums"
                             style={{ color: tone, whiteSpace: "nowrap", opacity: highlighted?1:0.75 }}>
                          {field[0]} · {(conf*100).toFixed(1)}%
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div className="mt-3 text-center text-[11px] text-gray-500">
                  Page 1 of {doc.pages} · OCR quality: {doc.ocrQuality} · {doc.fields} fields extracted

              </div>

                  <div className="flex items-center gap-3 text-xs">
                    <div><span className="tabular-nums font-semibold brand-navy">{doc.extracted.length}</span> fields</div>
                    <div><span className="tabular-nums font-semibold text-emerald-700">{doc.extracted.filter(f=>f[2]>0.98).length}</span> high confidence</div>
                    <div><span className="tabular-nums font-semibold text-amber-700">{doc.extracted.filter(f=>f[2]<0.9).length}</span> needs review</div>
                  </div>
                </div>
                <div className="divide-y divide-gray-100">
                  {doc.extracted.map((f, i) => {
                    const conf = f[2];
                    const tone = conf > 0.98 ? "emerald" : conf > 0.9 ? "gray" : "amber";
                    const isHover = hoverField === i;
                    const val = edits[i] !== undefined ? edits[i] : f[1];
                    return (
                      <div key={i}
                        onMouseEnter={()=>setHoverField(i)}
                        onMouseLeave={()=>setHoverField(null)}
                        className={`p-3 transition-colors ${isHover?"bg-brand-navy-50":"hover:bg-gray-50"}`}>
                        <div className="flex items-start justify-between gap-2 mb-1">
                          <div className="flex-1 min-w-0">
                            <div className="text-[11px] text-gray-500 uppercase tracking-wider font-semibold">{f[0]}</div>
                          </div>
                          <div className="flex items-center gap-1">
                            <span className={`text-[10px] tabular-nums ${conf>0.98?"text-emerald-700":conf>0.9?"text-gray-500":"text-amber-700"}`}>
                              {(conf*100).toFixed(1)}%
                            </span>
                            <Icon name={conf>0.98?"check-circle-2":conf>0.9?"check":"alert-triangle"} size={11}
                              className={conf>0.98?"text-emerald-600":conf>0.9?"text-gray-400":"text-amber-600"} />
                          </div>
                        </div>
                        {editingField === i ? (
                          <div className="flex items-center gap-2">
                            <input value={val} onChange={e => setEdits({ ...edits, [i]: e.target.value })}
                              className="flex-1 border border-brand-navy rounded px-2 py-1 text-sm font-mono focus:outline-none" autoFocus/>
                            <Btn variant="primary" size="sm" icon="check" onClick={()=>save(i)}>Save</Btn>
                            <Btn variant="ghost" size="sm" onClick={()=>{setEditingField(null); setEdits({...edits,[i]:undefined});}}>Cancel</Btn>
                          </div>
                        ) : (
                          <div className="flex items-center justify-between gap-2">
                            <div className="text-sm text-gray-800 font-mono truncate" title={val}>{val}</div>
                            <button onClick={()=>setEditingField(i)} className="text-gray-400 hover:text-brand-navy p-1" title="Edit">
                              <Icon name="pencil" size={12}/>
                            </button>
                          </div>
                        )}
                        {edits[i] !== undefined && edits[i] !== f[1] && (
                          <div className="text-[10px] text-emerald-700 mt-0.5">
                            <Icon name="check" size={9} className="inline"/> Correction queued · logged to audit
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
            <div className="px-5 py-3 border-t border-gray-200 bg-gray-50 flex items-center justify-between">
              <div className="text-[11px] text-gray-500">Classifier confidence: <span className="font-semibold tabular-nums">{(doc.classifierConfidence*100).toFixed(1)}%</span> · Uploaded from {doc.source}</div>
              <div className="flex items-center gap-2">

                <Btn variant="primary" size="sm" icon="check" onClick={()=>{dispatch({type:"TOAST",toast:"Fields saved · ADE re-running downstream items"}); onClose();}}>Commit corrections</Btn>
              </div>
            </div>
          </div>
        </div>
      );

    const Documents = () => {
      const [search, setSearch] = useState("");
      const [typeFilter, setTypeFilter] = useState("all");
      const [handlerFilter, setHandlerFilter] = useState("all");
      const [statusFilter, setStatusFilter] = useState("all");
      const [confFilter, setConfFilter] = useState("all");
      const [open, setOpen] = useState(null);
      const [groupBy, setGroupBy] = useState("type");

      const filtered = useMemo(() => {
        let arr = [...ALL_DOCS];
        if (search) {
          const q = search.toLowerCase();
          arr = arr.filter(d => d.type.toLowerCase().includes(q) ||
                                  d.filename.toLowerCase().includes(q) ||
                                  d.loan.number.toLowerCase().includes(q) ||
                                  d.loan.borrower.toLowerCase().includes(q));
        }
        if (typeFilter !== "all") arr = arr.filter(d => d.type === typeFilter);
        if (handlerFilter !== "all") arr = arr.filter(d => d.handledBy === handlerFilter);
        if (statusFilter !== "all") arr = arr.filter(d => d.status === statusFilter);
        if (confFilter === "high") arr = arr.filter(d => d.classifierConfidence >= 0.95);
        if (confFilter === "review") arr = arr.filter(d => d.classifierConfidence < 0.95);
        return arr;
      }, [search, typeFilter, handlerFilter, statusFilter, confFilter]);

      const grouped = useMemo(() => {
        const g = {};
        filtered.forEach(d => {
          const key = groupBy === "type" ? d.type : groupBy === "loan" ? d.loan.number : d.handledBy;
          if (!g[key]) g[key] = [];
          g[key].push(d);
        });
        return g;
      }, [filtered, groupBy]);

      const highConf = ALL_DOCS.filter(d => d.classifierConfidence >= 0.95).length;
      const adeHandled = ALL_DOCS.filter(d => d.handledBy === "ADE").length;

      return (
        <div className="p-6 space-y-4">

              <Select label="Confidence" value={confFilter} setValue={setConfFilter} options={[["all","All confidence"],["high","≥ 95%"],["review","< 95%"]]} />
              <div className="ml-auto flex items-center gap-2">
                <div className="text-[11px] text-gray-500">Group by</div>
                <div className="flex items-center gap-1 bg-gray-50 border border-gray-200 rounded-md p-0.5">
                  {[["type","Type"],["loan","Loan"],["handler","Handler"]].map(([v,l]) => (
                    <button key={v} onClick={()=>setGroupBy(v)}
                      className={`text-[11px] px-2 py-1 rounded ${groupBy===v?"bg-white border border-gray-300 font-semibold brand-navy":"text-gray-600 hover:bg-white"}`}>

                      </div>
                    </button>
                  ))}
                </div>
              </Card>
            ))}
          </div>

          {open && <DocumentExtractionViewer doc={open} onClose={()=>setOpen(null)} />}

    /* ═════════════════════════════════════════════════════════════════════════════

    const expandTemplate = (template, loan) => {
      if (!loan) return { subject: template.subject, body: template.body };

        borrower_first: loan.borrower.split(" ")[0],
        borrower_last: loan.borrower.split(" ").slice(-1)[0],
        borrower_full: loan.borrower,
        loan_number: loan.number,
        loan_last5: loan.number.slice(-5),
        property_street: `${loan.property.street}, ${loan.property.city}, ${loan.property.state} ${loan.property.zip}`,
        mortgagee_clause: MORTGAGEE_CLAUSE,
        processor: loan.processor,
        funding_date: fmtDate(loan.fundingDate),
        milestone: loan.milestone,
        agent_name: `${pick(FIRST_NAMES)} ${pick(LAST_NAMES)}`,
        agent_company: pick(["Long Realty","Tierra Antigua","Coldwell Banker","Realty Executives","Keller Williams"]),
        agent_license: `${int(500000, 899999)}`,
        agent_phone: `(520) ${int(200,999)}-${int(1000,9999)}`
      };
      const replace = (s) => s.replace(/\{\{(\w+)\}\}/g, (_, k) => vars[k] != null ? vars[k] : `{{${k}}}`);
      return { subject: replace(template.subject), body: replace(template.body) };

    const ALL_THREADS = (() => {

    ═════════════════════════════════════════════════════════════════════════════ */
    const ANALYTICS_DATA = (() => {
      // 90 days of synthetic history
      const days = [];
      const today = new Date();
      for (let i = 89; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const progress = (89 - i) / 89; // 0 → 1 as we approach today
        const automation = 62 + progress * 28 + (Math.sin(i / 4) * 2) + (rand() * 2 - 1);
        const cycleADE = 22.5 - progress * 10 + (Math.cos(i / 5) * 0.6);
        const cycleManual = 23.5 + Math.sin(i / 9) * 0.8;
        const throughput = Math.round(36 + progress * 26 + Math.sin(i / 3) * 4 + (rand() * 3));
        const accuracy = 96.4 + progress * 2.2 + Math.sin(i / 6) * 0.3 + rand() * 0.4;
        const autoCleared = Math.round(82 + progress * 70 + Math.sin(i / 4) * 12 + rand() * 10);
        const escalated = Math.round(34 - progress * 14 + Math.cos(i / 5) * 5 + rand() * 4);
        days.push({
          date: d,
          dateLabel: d.toLocaleDateString("en-US", { month: "short", day: "numeric" }),
          automation: +automation.toFixed(1),
          cycleADE: +cycleADE.toFixed(1),
          cycleManual: +cycleManual.toFixed(1),
          throughput,
          accuracy: +accuracy.toFixed(2),
          autoCleared,
          escalated
        });
      }
      // Weekly roll-ups
      const weeks = [];
      for (let i = 0; i < 12; i++) {
        const slice = days.slice(i * 7, i * 7 + 7);
        if (slice.length === 0) continue;
        const last = slice[slice.length - 1];
        weeks.push({
          weekLabel: `W${12 - i}`,
          dateLabel: slice[0].dateLabel,
          throughput: slice.reduce((n, d) => n + d.throughput, 0),
          automation: +(slice.reduce((n, d) => n + d.automation, 0) / slice.length).toFixed(1),
          autoCleared: slice.reduce((n, d) => n + d.autoCleared, 0),
          escalated: slice.reduce((n, d) => n + d.escalated, 0),
          accuracy: +(slice.reduce((n, d) => n + d.accuracy, 0) / slice.length).toFixed(2)
        });
      }
      // Cost per loan — manual vs ADE over months
      const months = [];
      for (let i = 11; i >= 0; i--) {
        const d = new Date(today); d.setMonth(d.getMonth() - i);
        const progress = (11 - i) / 11;
        months.push({
          monthLabel: d.toLocaleDateString("en-US", { month: "short" }),
          manual: 1420 + Math.round(Math.sin(i / 2) * 25),
          ade: Math.round(1240 - progress * 520 - Math.cos(i / 3) * 30)
        });

      return { days, weeks: weeks.reverse(), months };

    /* ═════════════════════════════════════════════════════════════════════════════
       ROOT
    ═════════════════════════════════════════════════════════════════════════════ */
    const App = () => {
      const [state, dispatch] = useReducer(reducer, initialState);

      // Simulation engine — emits events at a cadence based on speed & running flag
      useEffect(() => {
        if (!state.adeRunning) return;
        let timer;
        const tick = () => {
          const loan = pick(LOANS);
          const template = pick(ACTION_TEMPLATES);
          const ev = template(loan);
          const event = {
            id: `ev-${Date.now()}-${Math.random().toString(36).slice(2,8)}`,
            ts: new Date(),
            loanNumber: loan.number,
            ...ev
          };
          dispatch({ type: "PUSH_EVENT", event });
          // schedule next — 1.8-3.8s at 1x
          const base = 1800 + Math.random() * 2000;
          const delay = Math.max(300, base / state.speed);
          timer = setTimeout(tick, delay);
        };
        timer = setTimeout(tick, 600);
        return () => clearTimeout(timer);
      }, [state.adeRunning, state.speed]);

      // Occasional new application — every ~20s at 1x
      useEffect(() => {
        if (!state.adeRunning) return;
        const iv = setInterval(() => {
          dispatch({ type: "NEW_APPLICATION" });
        }, 20000 / state.speed);
        return () => clearInterval(iv);
      }, [state.adeRunning, state.speed]);

      // Keyboard: Esc closes dropdowns via click-away effect (kept for future modals)
      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") { /* hook for modals */ } };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      return (
        <AppCtx.Provider value={{ state, dispatch, LOANS, JP_CHECKLIST, PC_CHECKLIST, MORTGAGEE_CLAUSE, LQB_SCREENS, LQB_FOLDERS }}>
          <Shell />
        </AppCtx.Provider>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
