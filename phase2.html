<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Altitude Home Loans — Autonomous Digital Employee Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }
    html, body, #root { height: 100%; margin: 0; padding: 0; background: #F8F9FB; color: #1F2937; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }
    @keyframes pulseRing {
      0% { transform: scale(0.9); opacity: 0.55; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes flash {
      0% { background-color: rgba(16,122,230,0.14); }
      100% { background-color: transparent; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(6px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }
    .pulse-ring { animation: pulseRing 1.8s ease-out infinite; }
    .fade-in-up { animation: fadeInUp 0.28s ease-out; }
    .slide-in { animation: slideIn 0.3s ease-out; }
    .flash { animation: flash 1.4s ease-out; }

    .card-shadow { box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 0 0 1px rgba(16, 24, 40, 0.04); }
    .ring-focus:focus { outline: 2px solid #1E3A6B; outline-offset: 2px; }

    .dense-table tr:hover { background: #F8FAFC; }
    .dense-table th { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #6B7280; }

    .grid-bg {
      background-image:
        linear-gradient(rgba(30,58,107,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,58,107,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .brand-navy { color: #1E3A6B; }
    .bg-brand-navy { background: #1E3A6B; }
    .bg-brand-navy-50 { background: #EEF2F8; }
    .bg-brand-navy-100 { background: #DCE3EE; }
    .border-brand-navy { border-color: #1E3A6B; }
    .text-brand-navy-dark { color: #152A4C; }

    .tooltip-wrap { position: relative; }
    .tooltip-wrap:hover .tooltip { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .tooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translate(-50%, 4px);
      background: #1F2937; color: #fff; font-size: 11px; padding: 6px 10px; border-radius: 6px;
      white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.15s ease; z-index: 50;
    }

    input[type="range"] { accent-color: #1E3A6B; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo, useReducer, useCallback, createContext, useContext, Fragment } = React;
    const {
      ResponsiveContainer, LineChart, Line, BarChart, Bar, AreaChart, Area,
      XAxis, YAxis, CartesianGrid, Tooltip: RTooltip, Legend, PieChart, Pie, Cell,
      RadialBarChart, RadialBar
    } = Recharts;

    /* ═════════════════════════════════════════════════════════════════════════════
       ICON SYSTEM — thin wrapper over lucide
    ═════════════════════════════════════════════════════════════════════════════ */
    const Icon = ({ name, size = 16, className = "", strokeWidth = 1.75, style }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = "";
          const el = document.createElement("i");
          el.setAttribute("data-lucide", name);
          ref.current.appendChild(el);
          window.lucide.createIcons({
            attrs: { width: size, height: size, "stroke-width": strokeWidth },
            nameAttr: "data-lucide"
          });
        }
      }, [name, size, strokeWidth]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, ...style }} />;
    };

    /* ═════════════════════════════════════════════════════════════════════════════
       BRAND
    ═════════════════════════════════════════════════════════════════════════════ */
    const BRAND = {
      navy: "#1E3A6B",
      navyDark: "#152A4C",
      navy50: "#EEF2F8",
      navy100: "#DCE3EE",
      accent: "#C89B3C",       // warm secondary, used sparingly
      success: "#0F7D4B",
      warning: "#B45309",
      danger: "#B42318",
      info: "#107AE6",
      surface: "#FFFFFF",
      surface2: "#F8F9FB",
      surface3: "#F3F4F6",
      surface4: "#EEF1F5",
      border: "#E5E7EB",
      border2: "#D1D5DB",
      text: "#1F2937",
      textMuted: "#6B7280",
      textLight: "#9CA3AF",
    };

    /* ═════════════════════════════════════════════════════════════════════════════
       DETERMINISTIC RANDOM (seeded) — so data is stable across renders
    ═════════════════════════════════════════════════════════════════════════════ */
    function seedRand(seed) {
      let s = seed >>> 0;
      return () => {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 4294967296;
      };
    }
    const rand = seedRand(20260420);
    const pick = (arr) => arr[Math.floor(rand() * arr.length)];
    const pickN = (arr, n) => {
      const copy = [...arr]; const out = [];
      for (let i = 0; i < n && copy.length; i++) out.push(copy.splice(Math.floor(rand()*copy.length),1)[0]);
      return out;
    };
    const int = (lo, hi) => lo + Math.floor(rand() * (hi - lo + 1));
    const chance = (p) => rand() < p;
    const maybe = (p, v, d = null) => rand() < p ? v : d;

    /* ═════════════════════════════════════════════════════════════════════════════
       ALTITUDE-SPECIFIC CONSTANTS
    ═════════════════════════════════════════════════════════════════════════════ */
    const MORTGAGEE_CLAUSE = "Altitude Financial Corporation, ISAOA/ATIMA, 1885 N Kolb Rd, Tucson AZ 85715";

    const LQB_SCREENS = [
      "This Loan Info",
      "Agents",
      "Title & Estate",
      "Disclosure Center",
      "Processing",
      "Loan Application",
      "Internal Comments"
    ];

    const LQB_FOLDERS = [
      "Pre-Closing Folder",
      "Initial Disclosure Folder",
      "Prelim Folder",
      "Pre-Closing Folder > Invoices Doc Type",
      "Pre-Closing Folder > Sign at Closing Doc Type",
      "Pre-Closing Folder > Processor Requests Doc Type",
      "Pre-Closing Folder > Wire Instructions Doc Type",
      "Pre-Closing Folder > Closing Docs Request Doc Type",
      "Pre-Closing Folder > VOE 1",
      "Pre-Closing Folder > VOE 2",
      "Pre-Closing Folder > VOE 3"
    ];

    /* ─── JP File Set-Up Checklist (26 items) ────────────────────────────────── */
    const JP_CHECKLIST = [
      { id: "js-1",  label: "Application & Disclosures split; FHA/VA disclosures split separately",

        ref: "USPS Address Verify; LQB → This Loan Info" },
      { id: "js-3",  label: "Current Property Tax Printout uploaded; monthly tax amount verified on This Loan Info",
        rule: "County tax portal printout parsed; annual tax / 12 compared against monthly tax on This Loan Info screen; variance >$5/mo triggers update.",
        ref: "LQB → This Loan Info" },
      { id: "js-4",  label: "Flood Certification requested & received; flood zone identified; processor notified if in flood zone",

      { id: "js-5",  label: "Agents Setup — Escrow & Title license numbers, Sellers, Listing/Buyer Agent on Agents screen",

      { id: "js-8",  label: "CPL — names, address, loan #, mortgagee clause, 60-day rule, escrow officer branch, signature",

      { id: "js-12", label: "Manufactured Homes — Affidavit of Affixture requested from Title",

      { id: "js-13", label: "Payoff ordered when processor indicates ready (refinances only)",

        rule: `Hazard dec page parsed. Effective date ≤ funding date AND in month of funding. Dwelling coverage ≥ loan amount OR RCE present. Mortgagee clause verbatim. Must be a policy, not a binder.`,
        ref: "Email; Pre-Closing Folder" },
      { id: "js-17", label: "VOEs requested for ALL borrowers & employers (VOE 1/2/3), processor copied, dates logged",
        rule: "The Work Number request for each borrower × employer combo. Processor cc'd. Request date logged on Processing screen.",
        ref: "The Work Number; LQB → Processing screen" },
      { id: "js-18", label: "Document-order dates logged on Processing screen under Status in LQB",
        rule: "Every outbound document request captures a date stamp into LQB Processing Status field.",
        ref: "LQB → Processing screen" },
      { id: "js-19", label: "Checklist uploaded to Processor Requests; labeled in Internal Comments",
        rule: "Completed JP Checklist PDF uploaded to Pre-Closing Folder > Processor Requests Doc Type. Upload noted in Internal Comments and categorized as Processor.",
        ref: "LQB → Processor Requests; Internal Comments" },
      { id: "js-20", label: "Conversation Log entry posted — date file was set up + helpful processor notes, category: Processor",
        rule: "Mandatory Internal Comments entry on file set-up date; categorized as Processor.",
        ref: "LQB → Internal Comments" },
      { id: "js-21", label: "Flood Insurance — hazard fields PLUS flood zone matches Cert; 1-year term; max dwelling $250,000",
        rule: "All hazard fields PLUS flood zone evidence matches Flood Certificate, 1-year term, dwelling coverage ≤ $250,000.",

      { id: "js-22", label: "Condos & Multi-Units — unit number listed with property address",

      { id: "js-25", label: "Master List follow-up — Escrow, Listing Agent, Buyer Agent, Homeowners, Master Policy Agent, Flood Provider, VA Appraiser",

      { id: "js-26", label: "Agent submissions to Master List — drafted with correct Subject Line convention and attachments",
        rule: `Email drafts to agents@altitudehomeloans.com with subject convention "<Type> Added to Contact Master List — <Last>, #<LoanTail>". Attachments per role (Wire Instructions / CD / Prelim / License / EOI / Contract Signature Page).`,
        ref: "Email; Master List" }
    ];

    /* ─── Processor Closing Checklist (11 items) ──────────────────────────────── */
    const PC_CHECKLIST = [
      { id: "pc-1", label: "CPL — borrower names, property address, loan #, mortgagee clause verbatim, within 60 days of funding, signed",
        rule: `CPL reverified pre-close. Altitude mortgagee clause character-match required: "${MORTGAGEE_CLAUSE}". Closing date within 60 days of funding. Signature present.`,

        ref: "Pre-Closing Folder" },
      { id: "pc-4", label: "Title License — uploaded to Pre-Closing; branch license # and escrow officer match Agents screen",
        rule: "Title license in Pre-Closing Folder. Branch license and office escrow officer reconciled against Agents screen.",
        ref: "Pre-Closing Folder; LQB → Agents" },
      { id: "pc-5", label: "Flood Certification — flood zone captured; borrowers signed Flood Notice",

        ref: "Pre-Closing Folder" },
      { id: "pc-6", label: "Flood Insurance — full field set; dwelling max $250,000; new policy 1-year term; if application only, mortgagee & loan # must appear",
        rule: "Full hazard field set + flood specifics. Max dwelling $250K. New policy is 1-year. Application-only fallback requires mortgagee clause and loan number present.",
        ref: "Pre-Closing Folder" },
      { id: "pc-7", label: "Mortgage Insurance — MI Cert uploaded & reviewed; monthly/annual premium in LQB matches MI Cert",
        rule: "MI Certificate uploaded by UW; premiums reconciled against LQB to the cent.",
        ref: "Pre-Closing Folder; LQB → This Loan Info" },
      { id: "pc-8", label: "Fees — all invoices in Pre-Closing > Invoices; Appraisal / Final Inspection / IBTS / Engineering / Condo Q / Condo Master / Termite / Misc updated in LQB",
        rule: "Every invoice uploaded separately with description and fee amount. Named fees updated in LQB and accurate before ordering closing docs. TRID team escalation if guidance needed.",
        ref: "Pre-Closing Folder > Invoices Doc Type; LQB → This Loan Info" },
      { id: "pc-9", label: "VVOE — within 5 days of funding (10 self-employed; FHA day-of or day-before; second PTF for FHA); uploaded to VOE 1/2/3, screened",
        rule: "VVOE timing enforced per product. FHA may trigger second VVOE PTF. VOE uploaded to VOE 1/2/3 slot and screened.",
        ref: "The Work Number; Pre-Closing Folder > VOE 1/2/3" },
      { id: "pc-10", label: "Misc — PUD reflected in LQB + Lock, lock through funding, PITIA ≤ UW max, PTD conditions resolved, POA/Trust/Title Only sections complete, interest credit/signing/funding dates accurate, escrow waiver reflected",
        rule: "Multi-field reconciliation: Property Type PUD flag in This Loan Info AND Lock. Rate lock expiration > funding date. PITIA calculated ≤ UW maximum. All PTD conditions closed. POA/Trust borrower names match docs and approved. Title Only Borrowers section complete. Interest credit, signing, funding dates accurate in LQB. Escrow waiver mirrored across LQB and Lock when impounds waived.",
        ref: "LQB → This Loan Info; Lock Confirmation; Title & Estate" },
      { id: "pc-11", label: "Uploads — Wire Instructions, Doc Request Cover Page, Final LE w/ COC, ICD, Sign-at-Closing Docs all filed; Processor Closing Checklist uploaded (DO NOT screen)",
        rule: "Wire Instructions → Pre-Closing > Wire Instructions Doc Type (screened). Doc Request Cover Page with important file notes → Pre-Closing > Closing Docs Request (screened). Final LE signed + COC → Initial Disclosure Folder > LE Redisclosed w/ COC (screened + logged in Disclosure Center). ICD signed + uploaded. Sign-at-Closing docs → Pre-Closing > Sign at Closing. Processor Closing Checklist → Pre-Closing > Checklist Doc Type (DO NOT screen).",
        ref: "Pre-Closing Folder; Initial Disclosure Folder; Disclosure Center" }
    ];

    /* ═════════════════════════════════════════════════════════════════════════════
       DATA GENERATION — 40+ loans with full checklist state, docs, conditions, history
    ═════════════════════════════════════════════════════════════════════════════ */
    const FIRST_NAMES = ["Maria","Miguel","Carlos","Sofia","Diego","Isabella","Luis","Elena","Javier","Camila","Rafael","Valentina","Emilio","Ximena","Mateo","Lucia","Alejandro","Adriana","Ricardo","Daniela","James","Olivia","Noah","Emma","William","Ava","Ethan","Charlotte","Liam","Amelia","Aiden","Harper","Caleb","Evelyn","Logan","Abigail","Nguyen","Trinh","Aditya","Priya","Raj","Anjali","Dmitri","Anna","Yusuf","Fatima","Kai","Leilani","Jamal","Imani"];
    const LAST_NAMES = ["Rodriguez","Hernandez","Martinez","Garcia","Lopez","Gonzalez","Perez","Sanchez","Ramirez","Torres","Flores","Rivera","Gomez","Diaz","Cruz","Morales","Ortiz","Gutierrez","Chavez","Ramos","Ruiz","Mendoza","Aguilar","Castillo","Jimenez","Vargas","Navarro","Guerrero","Rojas","Medina","Nguyen","Tran","Pham","Patel","Singh","Kim","Park","Cho","Wagner","Becker","Schmidt","Brooks","Carter","Davis","Edwards","Foster","Greene","Hayes","Irving","Jacobs","Kelly","Lawson","Murphy","Nolan","Owens","Parker","Quinn","Reyes","Stone","Turner","Walsh","Young","Zimmerman","Rodriguez-Chavez","O'Brien","Begay","Yazzie"];
    const EMPLOYERS = ["Raytheon Technologies","Banner Health","Pima Community College","University of Arizona","Tucson Electric Power","Freeport-McMoRan","Honeywell Aerospace","ASU","Intel Corporation","City of Tucson","Tucson Medical Center","Caterpillar","Desert Diamond","US Air Force","Pima County","Carondelet Health Network","Davis-Monthan AFB","Sanofi","State Farm","Northern Arizona University","IBM","Boeing","American Express","Wells Fargo","Target","Amazon","Costco Wholesale","GEICO","Deloitte","Kforce"];
    const LOAN_OFFICERS = ["Sarah Mitchell","Diego Hernandez","Kelly Anderson","Marcus Thompson","Priya Patel","Jordan Ellis","Rosa Delgado","Ahmed Rahimi","Kate Lindqvist","Trevor Holloway","Nina Volkov","Brandon Cho"];
    const PROCESSORS = ["Jessica Alvarez","Ryan Whitaker","Monica Flores","Derek Chen","Hannah Kowalski","Samira Patel"];
    const AZ_CITIES = [["Tucson","85715"],["Tucson","85718"],["Tucson","85741"],["Oro Valley","85755"],["Marana","85658"],["Sahuarita","85629"],["Vail","85641"],["Phoenix","85016"],["Phoenix","85028"],["Scottsdale","85254"],["Scottsdale","85260"],["Mesa","85205"],["Tempe","85281"],["Chandler","85248"],["Gilbert","85295"],["Flagstaff","86001"],["Sedona","86336"],["Prescott","86303"]];

    const NV_CITIES = [["Las Vegas","89117"],["Henderson","89052"],["Reno","89511"]];
    const UT_CITIES = [["Salt Lake City","84103"],["Provo","84604"],["St. George","84770"]];
    const TX_CITIES = [["El Paso","79912"],["Austin","78704"],["Dallas","75219"]];
    const STREETS = ["Desert Sage","Saguaro Ridge","Cactus Wren","Tumamoc","Canyon Vista","Rincon Peak","Silver Spur","Mission View","Agave","Catalina","Sunset Canyon","Rillito","Speedway","Broadway","Grant","Camino Real","Old Spanish Trail","Placita","Via Dolorosa","Fort Lowell","La Cholla","Ina","Skyline","Sunrise","Swan","Craycroft","Tanque Verde","Harrison","Houghton","Pantano"];
    const STREET_SUFFIX = ["Dr","Ln","Way","Pl","Ct","Blvd","St","Rd","Trl","Ave"];

    const PRODUCTS = ["Conventional","FHA","VA","USDA","Jumbo","Bond"];
    const PRODUCT_WEIGHTS = [0.38, 0.22, 0.16, 0.06, 0.12, 0.06];
    const MILESTONES = ["Application","File Set-Up","Docs In","Verification","UW Submission","Conditions","Pre-Close","Clear to Close"];
    const MILESTONE_WEIGHTS = [0.05, 0.20, 0.15, 0.15, 0.12, 0.18, 0.10, 0.05];

    function weightedPick(arr, w) {
      let r = rand(), acc = 0;
      for (let i = 0; i < arr.length; i++) { acc += w[i]; if (r < acc) return arr[i]; }
      return arr[arr.length - 1];
    }

    function genAddress() {
      const locPool = [...AZ_CITIES, ...AZ_CITIES, ...AZ_CITIES, ...AZ_CITIES, ...CO_CITIES, ...NV_CITIES, ...UT_CITIES, ...TX_CITIES];
      const [city, zip] = pick(locPool);
      const state = AZ_CITIES.some(c=>c[0]===city) ? "AZ" :
                    CO_CITIES.some(c=>c[0]===city) ? "CO" :
                    NV_CITIES.some(c=>c[0]===city) ? "NV" :
                    UT_CITIES.some(c=>c[0]===city) ? "UT" : "TX";
      return { street: `${int(100,9999)} ${pick(STREETS)} ${pick(STREET_SUFFIX)}`, city, state, zip };
    }
    function genName() { return `${pick(FIRST_NAMES)} ${pick(LAST_NAMES)}`; }

    function fmtMoney(n, decimals=0) {
      return "$" + n.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }
    function fmtDate(d) {
      if (!d) return "—";
      const dt = (d instanceof Date) ? d : new Date(d);
      return dt.toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" });
    }
    function fmtDateTime(d) {
      const dt = (d instanceof Date) ? d : new Date(d);
      return dt.toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }
    function fmtTime(d) {
      const dt = (d instanceof Date) ? d : new Date(d);
      return dt.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
    }
    function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return d; }

    /* ─── Build a single loan ────────────────────────────────────────────────── */
    function buildLoan(seq) {
      const number = `AHL-2026-${(4800 + seq).toString().padStart(5, "0")}`;
      const borrower = genName();
      const hasCoBorrower = chance(0.55);
      const coBorrower = hasCoBorrower ? genName() : null;
      const property = genAddress();
      const product = weightedPick(PRODUCTS, PRODUCT_WEIGHTS);

      const isRefi = chance(0.22);
      const txnType = isRefi ? pick(["Rate/Term Refi","Cash-Out Refi"]) : "Purchase";
      const appraisedValue = int(180, 1400) * 1000;
      const amount = Math.round(appraisedValue * (0.70 + rand()*0.25) / 1000) * 1000;
      const ltv = +(amount / appraisedValue * 100).toFixed(1);
      const dti = +(26 + rand() * 22).toFixed(1);
      const rate = +(5.625 + rand() * 1.75).toFixed(3);

      const milestone = weightedPick(MILESTONES, MILESTONE_WEIGHTS);
      const milestoneIdx = MILESTONES.indexOf(milestone);

      const propertyType = (() => {
        const r = rand();
        if (product === "VA" && r < 0.30) return "PUD";
        if (r < 0.55) return "SFR";
        if (r < 0.72) return "PUD";
        if (r < 0.87) return "Condo";
        if (r < 0.94) return "Manufactured";
        return "Multi-Unit";
      })();

      const flags = {
        isRefi,
        isVA_PUD: product === "VA" && propertyType === "PUD",
        isManufactured: propertyType === "Manufactured",
        isCondo: propertyType === "Condo",
        isUSDAorBond: product === "USDA" || product === "Bond",
        isMultiUnit: propertyType === "Multi-Unit",
        hasPOA: chance(0.08),
        hasTrust: chance(0.06),
        hasTitleOnly: chance(0.12),
        selfEmployed: chance(0.22)
      };

      const loanOfficer = pick(LOAN_OFFICERS);
      const processor = pick(PROCESSORS);
      const applicationDate = daysAgo(int(2, 48));
      const fundingDate = new Date(applicationDate); fundingDate.setDate(fundingDate.getDate() + int(28, 55));
      const employer = pick(EMPLOYERS);
      const coEmployer = hasCoBorrower ? pick(EMPLOYERS) : null;

      /* Per-loan checklist status — weighted by milestone progress */
      const progressRatio = Math.max(0.15, Math.min(0.98, (milestoneIdx + rand()*1.2) / (MILESTONES.length - 1)));
      const buildChecklistStatus = (items, tilt = 0) => items.map((it, idx) => {
        const p = Math.max(0, Math.min(1, progressRatio + tilt - (idx / items.length) * 0.05 + (rand()-0.5)*0.15));
        let status;
        const r = rand();
        if (p > 0.85) status = r < 0.90 ? "verified" : (r < 0.95 ? "escalated" : "pending");
        else if (p > 0.55) status = r < 0.78 ? "verified" : (r < 0.92 ? "escalated" : "pending");
        else if (p > 0.25) status = r < 0.45 ? "verified" : (r < 0.62 ? "escalated" : (r < 0.85 ? "pending" : "failed"));
        else status = r < 0.22 ? "verified" : (r < 0.38 ? "escalated" : "pending");

        // product-based overrides / flag gating
        if (it.id === "js-12" && !flags.isManufactured) status = "n/a";
        if (it.id === "js-13" && !isRefi) status = "n/a";
        if (it.id === "js-15" && !isRefi) status = "n/a";
        if (it.id === "js-9"  && isRefi) status = "n/a";
        if (it.id === "js-22" && !(flags.isCondo || flags.isMultiUnit)) status = "n/a";
        if (it.id === "js-23" && !flags.isCondo) status = "n/a";
        if (it.id === "js-24" && !flags.isCondo) status = "n/a";

        const confidence = status === "verified" ? +(0.932 + rand()*0.064).toFixed(3) :
                           status === "escalated" ? +(0.55 + rand()*0.30).toFixed(3) :
                           status === "failed" ? +(0.30 + rand()*0.25).toFixed(3) :
                           status === "pending" ? null : null;
        const ts = status === "pending" || status === "n/a" ? null :
                   new Date(Date.now() - int(1, 72) * 3600 * 1000);

        return { ...it, status, confidence, ts, evidence: genEvidence(it, { borrower, coBorrower, property, amount, appraisedValue, number, product, fundingDate, flags }) };
      });

      const jp = buildChecklistStatus(JP_CHECKLIST, 0.05);
      const pc = buildChecklistStatus(PC_CHECKLIST, milestoneIdx >= 5 ? 0.02 : -0.35);

      /* Documents */
      const docTypes = [
        "1003 Loan Application","Credit Report","Paystub","W-2","Tax Return","Bank Statement",
        "USPS Address Verify","Property Tax Printout","Flood Certificate","CPL","Preliminary Title Report",
        "Wire Instructions","Hazard Dec Page","Flood Dec Page","VOE (Work Number)","Purchase Contract",
        "Government ID","Appraisal Report","Title Commitment","Final LE","Closing Disclosure","ICD","MI Certificate"
      ];
      if (flags.isCondo) docTypes.push("HO6 Policy","Master Policy");
      if (flags.isManufactured) docTypes.push("Affidavit of Affixture");
      if (isRefi) docTypes.push("Payoff Statement","Deed of Trust (Existing)");
      if (flags.isVA_PUD) docTypes.push("CC&Rs","Plat Map");
      const numDocs = int(12, 18);
      const chosenDocs = pickN(docTypes, Math.min(numDocs, docTypes.length));
      const documents = chosenDocs.map((t, i) => ({
        id: `${number}-doc-${i}`,
        type: t,
        filename: `${t.replace(/[^a-z0-9]+/gi,"_")}_${number}.pdf`,
        uploaded: new Date(Date.now() - int(1, 30) * 24 * 3600 * 1000),
        source: pick(["Borrower Upload","LO","Title Co.","Insurance Agent","The Work Number","CoreLogic","County Portal","Internal"]),
        classifierConfidence: +(0.86 + rand()*0.13).toFixed(3),
        ocrQuality: pick(["Excellent","Excellent","Good","Good","Fair"]),
        pages: int(1, 24),
        fields: int(8, 42),
        extracted: genExtraction(t, { borrower, coBorrower, property, amount, number, fundingDate }),
        handledBy: pick(["ADE","ADE","ADE","ADE","Human"]),
        status: pick(["Verified","Verified","Verified","Under Review","Escalated"])
      }));

      /* Conditions */
      const conditionLib = [
        { t: "Provide most recent 2 months bank statements — all pages", tag: "PTD", src: "DU" },
        { t: `Provide LOE for large deposit of ${fmtMoney(int(8000,24000))} on ${fmtDate(daysAgo(int(10,40)))}`, tag: "PTD", src: "DU" },
        { t: "Provide most recent paystub covering 30 days", tag: "PTD", src: "DU" },
        { t: "Provide signed & dated 4506-C", tag: "PTD", src: "DU" },
        { t: "Provide homeowners insurance dec page with dwelling coverage ≥ loan amount", tag: "PTD", src: "UW" },
        { t: "CPL to reflect Altitude Financial Corporation, ISAOA/ATIMA at 1885 N Kolb Rd, Tucson AZ 85715", tag: "PTD", src: "UW" },
        { t: "Second VVOE required PTF — FHA", tag: "PTF", src: "UW" },
        { t: "Title Only Party — complete Non-Obligate Borrowers section on Title & Estate screen", tag: "PTD", src: "UW" },
        { t: "Provide final executed purchase contract with all addenda", tag: "PTD", src: "UW" },
        { t: "Wire Instructions must match bank on Agents screen and Master List", tag: "PTF", src: "UW" },
        { t: "Flood Insurance — provide 1-year policy with dwelling coverage ≥ loan balance (capped $250K)", tag: "PTD", src: "UW" },
        { t: "Provide PUD CC&Rs (VA)", tag: "PTD", src: "UW" },
        { t: "Affidavit of Affixture from Title (Manufactured Home)", tag: "PTD", src: "UW" },
        { t: "Provide Payoff Statement good through funding date", tag: "PTF", src: "UW" },
        { t: "HO6 Policy — dwelling coverage ≥ 20% of appraised value", tag: "PTD", src: "UW" },
        { t: "Updated VOE within 5 days of funding (10 for self-employed)", tag: "PTF", src: "UW" },
        { t: "Rate lock must extend through funding date", tag: "PTF", src: "UW" },
        { t: "Hazard deductible must not exceed $5,000 or 5% dwelling", tag: "PTD", src: "UW" }
      ];
      const condCount = int(5, 12);
      const condSelected = pickN(conditionLib, condCount);
      const conditions = condSelected.map((c, i) => {
        const r = rand();
        const status = r < 0.48 ? "Cleared by ADE" :
                       r < 0.68 ? "Outstanding" :
                       r < 0.82 ? "Escalated" :
                       r < 0.92 ? "Submitted to UW" : "Human Cleared";
        return {
          id: `${number}-cond-${i}`,
          idx: i + 1,
          text: c.t,
          tag: c.tag,
          source: c.src,
          status,
          clearedAt: (status === "Cleared by ADE" || status === "Human Cleared") ? new Date(Date.now() - int(1, 48) * 3600 * 1000) : null,
          reasoning: status === "Cleared by ADE" ? pick([
            `Matched against ${pick(["W-2","Paystub","Bank Stmt","Purchase Contract","CPL","Prelim","Hazard Dec","VOE"])} — all fields validate.`,
            `Altitude mortgagee clause verified verbatim on document.`,
            `Date check passed — within required window.`,
            `Deductible ${fmtMoney(int(1000,5000))} ≤ rule threshold.`,
            `Extraction confidence ${(0.94 + rand()*0.05).toFixed(3)}; no flags raised.`
          ]) : null
        };
      });

      /* Decision history */
      const historyLib = [
        (r) => `Parsed W-2 for ${borrower} (${employer}) — ${int(18,28)} fields extracted @ ${(0.92+r*0.07).toFixed(3)}`,
        (r) => `CPL mortgagee clause character-match against "${MORTGAGEE_CLAUSE}" — PASS`,
        (r) => `Prelim name check — "${borrower}" matches ID within tolerance`,
        (r) => `DU submitted — awaiting findings`,
        (r) => `VOE received from The Work Number for ${employer} — employer and income match 1003`,
        (r) => `Hazard deductible check — ${fmtMoney(int(500,5500))} vs ${flags.isUSDAorBond ? "$1,000" : "$5,000"} cap`,
        (r) => `Wire Instructions three-way match: Agents screen ↔ Master List ↔ Wire Doc — PASS`,
        (r) => `Property Tax Printout — monthly ${fmtMoney(int(150,900))} updated on This Loan Info screen`,
        (r) => `USPS Address Verify — exact match to LQB subject property`,
        (r) => `Flood Cert received — Zone ${pick(["X","X","A","AE"])}`,
        (r) => `Agents screen: Listing Agent ${pick(LAST_NAMES)}, License #${int(500000, 899999)} — verified against Master List`,
        (r) => `Internal Comments entry posted (category: Processor) — file set-up completed ${fmtDate(applicationDate)}`,
        (r) => `Condition #${int(1, 10)} cleared — ${pick(["Bank stmt pages complete","LOE received & reasonable","Paystub current","Insurance coverage sufficient"])}`,
        (r) => `Master List agent submission drafted — Subject: "${pick(["Title","Escrow","Realtor","Homeowners"])} Added to Contact Master List — ${pick(LAST_NAMES)}, #${number.slice(-5)}"`,
        (r) => `Final LE + COC uploaded to Initial Disclosure Folder > LE Redisclosed w/ COC; logged on Disclosure Center screen`,
        (r) => `VVOE window check — ${int(1, 9)} days to funding (within ${flags.selfEmployed ? "10-day" : "5-day"} rule)`,
        (r) => `Title & Estate screen completeness check — all required fields present`,
        (r) => `Checklist uploaded to Pre-Closing > Processor Requests Doc Type — logged in Internal Comments`
      ];
      const historyCount = int(20, 40);
      const history = [];
      for (let i = 0; i < historyCount; i++) {
        const fn = pick(historyLib);
        history.push({
          id: `${number}-hist-${i}`,
          ts: new Date(Date.now() - int(1, 72*60) * 60 * 1000),
          actor: chance(0.86) ? "ADE: Dynamic Loan Processor" : `Human: ${processor}`,
          message: fn(rand()),
          confidence: chance(0.8) ? +(0.88 + rand()*0.11).toFixed(3) : null
        });
      }
      history.sort((a,b) => b.ts - a.ts);

      /* Lock / key facts */
      const lock = {
        rate,
        lockExpires: new Date(fundingDate.getTime() + int(-3, 14) * 24 * 3600 * 1000),
        pud: propertyType === "PUD",
        escrowWaived: chance(0.15),
        monthlyMI: product === "FHA" || product === "Conventional" && ltv > 80 ? +(amount * 0.00055).toFixed(2) : 0
      };

      return {
        number, borrower, coBorrower, property, product, amount, ltv, dti, rate,
        milestone, milestoneIdx, txnType, propertyType, flags, loanOfficer, processor,
        applicationDate, fundingDate, appraisedValue, employer, coEmployer,
        jp, pc, documents, conditions, history, lock,
        adeStatus: chance(0.90) ? "Active" : pick(["Paused","Awaiting Human"]),
        lastAction: history[0]?.message || "—",
        lastActionTs: history[0]?.ts || new Date()
      };
    }

    function genEvidence(item, ctx) {
      const { borrower, property, amount, number, fundingDate } = ctx;
      const map = {
        "js-2": { doc: "USPS_AddressVerify.pdf", fields: [
          ["USPS Standardized", `${property.street}, ${property.city}, ${property.state} ${property.zip}`],
          ["LQB This Loan Info", `${property.street}, ${property.city}, ${property.state} ${property.zip}`],
          ["Match", "EXACT"]
        ]},
        "js-8": { doc: "CPL_TitleCo.pdf", fields: [
          ["Borrowers on CPL", ctx.coBorrower ? `${borrower}; ${ctx.coBorrower}` : borrower],
          ["Property", `${property.street}, ${property.city}, ${property.state} ${property.zip}`],
          ["Loan #", number],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE],
          ["Issue Date", fmtDate(daysAgo(int(5, 45)))],
          ["Funding Date (LQB)", fmtDate(fundingDate)],
          ["Within 60 days of funding", "PASS"],
          ["Signed", "YES"]
        ]},
        "js-11": { doc: "Prelim_Commitment.pdf", fields: [
          ["Names + Vesting", ctx.coBorrower ? `${borrower} and ${ctx.coBorrower}, husband and wife as joint tenants` : `${borrower}, a single person`],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE],
          ["Loan Amount (Prelim)", fmtMoney(amount)],
          ["Loan Amount (LQB)", fmtMoney(amount)],
          ["Within 60 days of funding", "PASS"]
        ]},
        "js-16": { doc: "Hazard_DecPage.pdf", fields: [
          ["Named Insured", ctx.coBorrower ? `${borrower} & ${ctx.coBorrower}` : borrower],
          ["Property", `${property.street}, ${property.city}`],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE],
          ["Loan Number", number],
          ["Policy Number", `HO-${int(1000000, 9999999)}`],
          ["Annual Premium", fmtMoney(int(800, 3400))],
          ["Effective Date", fmtDate(daysAgo(int(5, 30)))],
          ["Dwelling Coverage", fmtMoney(Math.round(amount * (0.95 + rand()*0.2)))],
          ["Policy Type", "POLICY (not binder)"]
        ]},
        "pc-3": { doc: "Hazard_DecPage.pdf", fields: [
          ["Deductible", fmtMoney(int(500, 5000))],
          ["Dwelling Coverage", fmtMoney(Math.round(amount * 1.03))],
          ["Rule", ctx.flags.isUSDAorBond ? "$1,000 or 1% of dwelling (USDA/Bond)" : "$5,000 or 5% of dwelling"],
          ["Result", "WITHIN LIMIT"],
          ["Paid-in-Full Receipt", "ATTACHED"]
        ]},
        "pc-2": { doc: "Prelim_Commitment.pdf + ID.pdf", fields: [
          ["Prelim Name", borrower],
          ["ID Name", borrower],
          ["Tolerance Match", "PASS"],
          ["Loan Amount (Prelim)", fmtMoney(amount)],
          ["Loan Amount (LQB)", fmtMoney(amount)],
          ["Loan Amount (Lock Confirmation)", fmtMoney(amount)],
          ["Title & Estate screen", "All fields present"]
        ]},
      };
      return map[item.id] || {
        doc: pick(["CPL_TitleCo.pdf","Prelim_Commitment.pdf","Hazard_DecPage.pdf","Flood_DecPage.pdf","Wire_Instructions.pdf","VOE_WorkNumber.pdf","USPS_AddressVerify.pdf"]),
        fields: [
          ["ADE check", item.label.split(" — ")[0]],
          ["Rule applied", item.rule.split(".")[0] + "."],
          ["Reference", item.ref],
          ["Result", pick(["PASS","PASS","PASS","REVIEW"])]
        ]
      };
    }

    function genExtraction(docType, ctx) {
      const base = {
        "1003 Loan Application": [
          ["Borrower", ctx.borrower, 0.992],
          ["Co-Borrower", ctx.coBorrower || "—", 0.984],
          ["Subject Property", `${ctx.property.street}, ${ctx.property.city}, ${ctx.property.state} ${ctx.property.zip}`, 0.988],
          ["Loan Amount", fmtMoney(ctx.amount), 0.996],
          ["Estimated Closing Date", fmtDate(ctx.fundingDate), 0.974]
        ],
        "W-2": [
          ["Employer", "Raytheon Technologies", 0.991],
          ["Box 1 Wages", fmtMoney(int(60000, 180000)), 0.993],
          ["Box 2 Fed WH", fmtMoney(int(8000, 32000)), 0.981],
          ["EIN", `${int(10,99)}-${int(1000000, 9999999)}`, 0.978]
        ],
        "CPL": [
          ["Mortgagee Clause", MORTGAGEE_CLAUSE, 0.997],
          ["Loan #", ctx.number, 0.995],
          ["Property", `${ctx.property.street}, ${ctx.property.city}, ${ctx.property.state}`, 0.991],
          ["Signed", "YES", 0.989]
        ],
        "Preliminary Title Report": [
          ["Vested Party", ctx.coBorrower ? `${ctx.borrower} and ${ctx.coBorrower}` : ctx.borrower, 0.987],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE, 0.995],
          ["Loan Amount", fmtMoney(ctx.amount), 0.992],
          ["Property", `${ctx.property.street}, ${ctx.property.city}, ${ctx.property.state}`, 0.988]
        ],
        "Hazard Dec Page": [
          ["Dwelling Coverage", fmtMoney(Math.round(ctx.amount * 1.02)), 0.991],
          ["Deductible", fmtMoney(int(500, 5000)), 0.988],
          ["Mortgagee Clause", MORTGAGEE_CLAUSE, 0.994],
          ["Policy vs Binder", "POLICY", 0.993]
        ],
        "VOE (Work Number)": [
          ["Employer", "Banner Health", 0.99],
          ["Employment Status", "Active", 0.994],
          ["Start Date", fmtDate(daysAgo(int(365, 3000))), 0.978],
          ["YTD Earnings", fmtMoney(int(30000, 180000)), 0.984]
        ]
      };
      return base[docType] || [
        ["Doc Type", docType, 0.962],
        ["Borrower", ctx.borrower, 0.976],
        ["Loan #", ctx.number, 0.981],
        ["Pages Parsed", `${int(1,18)}`, 0.998]
      ];
    }

    /* Build 44 loans */
    const LOANS = (() => {
      const arr = [];
      for (let i = 0; i < 44; i++) arr.push(buildLoan(i));
      // force-inject diversity: ensure we have examples
      const ensure = (pred, mutate) => {
        if (!arr.some(pred)) {
          const target = arr[arr.length - 1 - arr.filter(pred).length];
          mutate(target);
        }
      };
      ensure(l => l.flags.isVA_PUD, l => { l.product = "VA"; l.propertyType = "PUD"; l.flags.isVA_PUD = true; });
      ensure(l => l.flags.isManufactured, l => { l.propertyType = "Manufactured"; l.flags.isManufactured = true; });
      ensure(l => l.flags.isCondo, l => { l.propertyType = "Condo"; l.flags.isCondo = true; });
      ensure(l => l.flags.isUSDAorBond, l => { l.product = "USDA"; l.flags.isUSDAorBond = true; });
      ensure(l => l.flags.isRefi, l => { l.flags.isRefi = true; l.txnType = "Rate/Term Refi"; });
      return arr;
    })();

    /* ═════════════════════════════════════════════════════════════════════════════
       SIMULATION ENGINE — generates live activity
    ═════════════════════════════════════════════════════════════════════════════ */
    const ACTION_TEMPLATES = [
      (l) => ({ msg: `Extracted ${int(14,32)} fields from W-2 (Borrower: ${l.borrower.split(" ")[0][0]}. ${l.borrower.split(" ").slice(-1)[0]})`, conf: +(0.95+rand()*0.04).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `Verified CPL mortgagee clause matches "${MORTGAGEE_CLAUSE}" · File Set-Up item 8 auto-verified`, conf: +(0.97+rand()*0.02).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `Prelim name check: "${l.borrower}" matches ID within tolerance · Closing item 2 auto-verified`, conf: +(0.94+rand()*0.05).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `DU submitted · awaiting findings…`, conf: null, kind: "info" }),
      (l) => ({ msg: `VOE received from The Work Number · Employer and income match 1003 · VVOE window: ${int(2,9)} days to funding (within ${l.flags.selfEmployed?"10":"5"}-day rule) · Condition #${int(1,9)} cleared`, conf: +(0.96+rand()*0.03).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `Hazard deductible flagged: ${fmtMoney(int(5200,7500))} exceeds ${l.flags.isUSDAorBond?"$1,000 / 1%":"$5,000 / 5%"} rule · Escalating to processor`, conf: +(0.89+rand()*0.06).toFixed(3), kind: "warn" }),
      (l) => ({ msg: `Tax transcript variance detected (${fmtMoney(int(1200,8400))} from Schedule C) · Escalating to human review`, conf: +(0.71+rand()*0.15).toFixed(3), kind: "warn" }),
      (l) => ({ msg: `Master List check: ${pick(["Listing Agent","Buyer Agent","Homeowners Agent","Escrow Officer"])} missing → drafted submission to agents@altitudehomeloans.com (Subject: "${pick(["Realtor","Title","Escrow","Homeowners"])} Added to Contact Master List — ${l.borrower.split(" ").slice(-1)[0]}, #${l.number.slice(-5)}") · awaiting send approval`, conf: null, kind: "info" }),
      (l) => ({ msg: `CPL date check: ${int(12,59)} days from funding (within 60-day rule) · File Set-Up item 8 auto-verified`, conf: +(0.98+rand()*0.015).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `Flood Insurance dwelling coverage check: ${fmtMoney(int(150000,250000))} ≤ $250K cap · Closing item 6 auto-verified`, conf: +(0.97+rand()*0.02).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `HO6 policy dwelling: ${fmtMoney(int(38000,46000))} vs 20% of ${fmtMoney(l.appraisedValue)} (${fmtMoney(Math.round(l.appraisedValue*0.2))}) · ${rand()<0.5?"SHORT":"PASS"} · ${rand()<0.5?"Escalating":"Auto-verified"}`, conf: +(0.87+rand()*0.1).toFixed(3), kind: rand()<0.5?"warn":"ok" }),
      (l) => ({ msg: `Conversation Log entry posted to Processor category · File Set-Up item 20 complete`, conf: +(0.99).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `Wire Instructions three-way match (Agents ↔ Master List ↔ Wire doc) · PASS`, conf: +(0.98+rand()*0.015).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `USPS Address Verify uploaded · address matches LQB → ${l.property.street}, ${l.property.city}`, conf: +(0.99).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `Title & Estate screen completeness check${l.flags.hasTitleOnly?" (Title Only Party)":""} · all required fields present`, conf: +(0.96+rand()*0.03).toFixed(3), kind: "ok" }),
      (l) => ({ msg: `Agents screen: Escrow Officer license #${int(500000,899999)}, Branch ${l.property.city} — verified against Master List`, conf: +(0.97+rand()*0.02).toFixed(3), kind: "ok" }),

      toast: null,

    function reducer(state, action) {
      switch (action.type) {
        case "NAV": return { ...state, section: action.section, selectedLoanId: action.loanId ?? state.selectedLoanId };
        case "TOGGLE_SIDEBAR": return { ...state, sidebarCollapsed: !state.sidebarCollapsed };
        case "SET_ENV": return { ...state, env: action.env };
        case "ADE_CONTROL":
          if (action.control === "start") return { ...state, adeRunning: true, adeStatus: "Active" };
          if (action.control === "pause") return { ...state, adeRunning: false, adeStatus: "Paused" };
          if (action.control === "stop") return { ...state, adeRunning: false, adeStatus: "Stopped", activityFeed: [] };
          return state;
        case "SET_SPEED": return { ...state, speed: action.speed };
        case "PUSH_EVENT": {
          const next = [action.event, ...state.activityFeed].slice(0, 80);
          return { ...state, activityFeed: next,
                   kpis: { ...state.kpis,
                     autoClearedToday: state.kpis.autoClearedToday + (action.event.kind === "ok" ? 1 : 0),
                     exceptionsOpen: state.kpis.exceptionsOpen + (action.event.kind === "warn" ? 1 : 0),
                     actionsPerMin: Math.max(12, Math.min(90, state.kpis.actionsPerMin + int(-2,3))),
                   } };
        }
        case "SELECT_LOAN": return { ...state, section: "pipeline-detail", selectedLoanId: action.id };
        case "BACK_TO_PIPELINE": return { ...state, section: "pipeline", selectedLoanId: null };
        case "SELECT_EMPLOYEE": return { ...state, selectedEmployeeId: action.id };
        case "TOAST": return { ...state, toast: action.toast };
        case "CLEAR_TOAST": return { ...state, toast: null };
        case "NEW_APPLICATION": return { ...state, kpis: { ...state.kpis, applicationsToday: state.kpis.applicationsToday + 1, loansInFlight: state.kpis.loansInFlight + 1 } };
        default: return state;

              <div className="text-sm text-gray-600 mt-1">

              <div className="flex items-center gap-5 mt-3 text-sm">

                </div>
                <div className="h-10 w-px bg-gray-200" />
                <div>
                  <div className="text-[11px] uppercase tracking-wider text-gray-500 font-semibold">Exceptions open</div>
                  <div className="text-xl font-semibold text-amber-700 tabular-nums">{state.kpis.exceptionsOpen}</div>
                </div>
              </div>
            </div>
            <div className="flex flex-col gap-2 items-end">
              <div className="flex items-center gap-2">
                {state.adeStatus !== "Active" && controlBtn("Start", "play", "start", "primary")}
                {state.adeStatus === "Active" && controlBtn("Pause", "pause", "pause", "secondary")}
                {controlBtn("Stop", "square", "stop", "ghost")}
              </div>
              <div className="flex items-center gap-1 bg-gray-50 border border-gray-200 rounded-md p-0.5">
                {[1,2,5].map(s => (
                  <button key={s} onClick={()=>dispatch({type:"SET_SPEED", speed: s})}
                    className={`text-xs px-2 py-1 rounded ${state.speed===s?"bg-white border border-gray-300 font-semibold brand-navy":"text-gray-600 hover:bg-white"}`}>
                    {s}×
                  </button>
                ))}
              </div>
              <div className="text-[11px] text-gray-500">Demo speed</div>
            </div>
          </div>
        </Card>
      );
    };

    const ActivityFeed = () => {
      const { state } = useApp();
      const feed = state.activityFeed;
      return (
        <Card padding="p-0" className="overflow-hidden flex flex-col" >
          <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="activity" size={16} className="brand-navy" />
              <div className="text-sm font-semibold brand-navy">Live Activity Stream</div>
              {state.adeStatus === "Active" && <Pill tone="success" size="xs"><StatusDot tone="success" pulse size={6} /> LIVE</Pill>}
              {state.adeStatus === "Paused" && <Pill tone="warn" size="xs">PAUSED</Pill>}
              {state.adeStatus === "Stopped" && <Pill tone="mute" size="xs">STOPPED</Pill>}
            </div>
            <div className="text-xs text-gray-500">Last {feed.length} events</div>
          </div>
          <div className="overflow-y-auto" style={{ maxHeight: 420 }}>
            {feed.length === 0 ? (
              <div className="px-4 py-10 text-center text-sm text-gray-500">
                {state.adeStatus==="Stopped" ? "ADE is stopped. Click Start to resume autonomous work." : "Warming up…"}
              </div>
            ) : feed.map((e, idx) => (
              <div key={e.id} className={`px-4 py-2 border-b border-gray-100 slide-in ${idx===0?"flash":""}`}>
                <div className="flex items-start gap-3">
                  <div className="text-[11px] tabular-nums text-gray-400 mt-0.5 shrink-0 w-14">{fmtTime(e.ts)}</div>
                  <div className="shrink-0 mt-1">
                    {e.kind === "ok" && <Icon name="check-circle-2" size={14} className="text-emerald-600" />}
                    {e.kind === "warn" && <Icon name="alert-triangle" size={14} className="text-amber-600" />}
                    {e.kind === "info" && <Icon name="info" size={14} className="text-sky-600" />}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs">
                      <span className="font-semibold brand-navy">#{e.loanNumber}</span>
                      <span className="text-gray-700 ml-2">{e.msg}</span>
                    </div>
                    {e.conf != null && <div className="text-[10px] text-gray-500 mt-0.5">Confidence {(e.conf*100).toFixed(1)}%</div>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </Card>
      );
    };

    /* ═════════════════════════════════════════════════════════════════════════════
       PIPELINE HEATMAP — loans grouped by milestone, colored by aging
    ═════════════════════════════════════════════════════════════════════════════ */
    const ageOfLoan = (l) => Math.floor((Date.now() - l.applicationDate.getTime()) / (24 * 3600 * 1000));
    const ageTone = (days) => days <= 7 ? "success" : days <= 18 ? "info" : days <= 30 ? "warn" : "danger";

    const PipelineHeatmap = () => {
      const { dispatch } = useApp();
      const grouped = MILESTONES.map(m => ({
        milestone: m,
        loans: LOANS.filter(l => l.milestone === m).sort((a,b) => ageOfLoan(b) - ageOfLoan(a))
      }));

      return (
        <Card padding="p-0" className="overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="layout-grid" size={16} className="brand-navy" />
              <div className="text-sm font-semibold brand-navy">Pipeline Heatmap</div>
              <span className="text-xs text-gray-500">· {LOANS.length} loans by milestone, colored by aging</span>
            </div>
            <div className="flex items-center gap-3 text-[11px] text-gray-500">
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm" style={{background:"#34d399"}}></span>≤ 7d</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm" style={{background:"#38bdf8"}}></span>8–18d</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm" style={{background:"#f59e0b"}}></span>19–30d</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm" style={{background:"#ef4444"}}></span>31d+</span>
            </div>
          </div>
          <div className="p-4">
            <div className="grid grid-cols-8 gap-3">
              {grouped.map(g => {
                const agingCounts = { success: 0, info: 0, warn: 0, danger: 0 };
                g.loans.forEach(l => { agingCounts[ageTone(ageOfLoan(l))]++; });
                return (
                  <div key={g.milestone} className="min-w-0">
                    <div className="flex items-center justify-between mb-2">
                      <div className="text-[11px] font-semibold text-gray-700 truncate" title={g.milestone}>{g.milestone}</div>
                      <div className="text-[11px] tabular-nums font-medium text-gray-500">{g.loans.length}</div>
                    </div>
                    <div className="grid grid-cols-4 gap-[3px]">
                      {g.loans.length === 0 ? (
                        <div className="col-span-4 text-center text-[10px] text-gray-400 py-3 border border-dashed border-gray-200 rounded">—</div>
                      ) : g.loans.map(l => {
                        const tone = ageTone(ageOfLoan(l));
                        const bg = tone==="success"?"#34d399":tone==="info"?"#38bdf8":tone==="warn"?"#f59e0b":"#ef4444";
                        return (
                          <button key={l.number}
                            onClick={()=>dispatch({type:"SELECT_LOAN", id: l.number})}
                            title={`${l.number} · ${l.borrower} · ${ageOfLoan(l)}d · ${l.product} · ${fmtMoney(l.amount)}`}
                            className="relative rounded-sm ring-focus hover:ring-2 hover:ring-offset-1 transition-all"
                            style={{ aspectRatio: "1 / 1", background: bg, opacity: 0.85 }}>
                          </button>
                        );
                      })}
                    </div>
                    <div className="flex items-center gap-2 mt-2 text-[10px] text-gray-500">
                      {agingCounts.danger > 0 && <span className="text-red-700 font-semibold">{agingCounts.danger} aging</span>}
                      {agingCounts.danger === 0 && agingCounts.warn > 0 && <span className="text-amber-700">{agingCounts.warn} watch</span>}
                      {agingCounts.danger === 0 && agingCounts.warn === 0 && g.loans.length > 0 && <span className="text-emerald-700">healthy</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </Card>
      );
    };

    /* ═════════════════════════════════════════════════════════════════════════════
       TODAY'S EXCEPTIONS PANEL — with resolution workspace modal
    ═════════════════════════════════════════════════════════════════════════════ */
    const EXCEPTION_LIB = [
      { kind: "Hazard Deductible Exceeds Rule", severity: "warn", detail: "Deductible $6,000 exceeds $5,000 / 5% of dwelling rule", rule: "Closing Checklist item 3 — Hazard deductible ≤ $5,000 or 5% (USDA/Bond $1K/1%)", resolution: ["Request endorsement from insurance agent to lower deductible", "Upload amended dec page to Pre-Closing Folder", "Re-run checklist item 3"] },
      { kind: "HO6 Dwelling Coverage Short", severity: "warn", detail: "HO6 dwelling $42,400 vs required 20% of appraised ($43,600) — short $1,200", rule: "File Set-Up item 23 — HO6 dwelling ≥ 20% of appraised value", resolution: ["Request HO6 endorsement to increase dwelling to $43,600", "Upload updated dec page", "Re-run checklist item 23"] },
      { kind: "Tax Transcript Variance", severity: "warn", detail: "Schedule C income varies by $4,200 from 1003 and W-2", rule: "Fannie B3-3.1 — Income calc must reconcile", resolution: ["Request LOE from borrower for variance", "Re-run income calc", "Escalate to underwriter if unresolved"] },
      { kind: "Master List Submission Pending", severity: "info", detail: "Realtor Listing Agent missing — draft prepared to agents@altitudehomeloans.com", rule: "File Set-Up item 26 — Agent submissions to Master List", resolution: ["Review draft email and attachments (Wire, License)", "Approve to send", "Confirm Master List entry created"] },
      { kind: "Prelim / ID Name Mismatch", severity: "danger", detail: `Prelim name "Maria E Rodriguez" does not match ID "Maria Elena Rodriguez-Chavez"`, rule: "Closing Checklist item 2 — Name on prelim must match name on ID", resolution: ["Request amended prelim from Title", "Verify against Title & Estate screen", "Re-run checklist item 2"] },
      { kind: "CPL 60-Day Rule Breach", severity: "warn", detail: "CPL issued 64 days before funding date — exceeds 60-day rule", rule: "File Set-Up item 8 / Closing Checklist item 1 — Within 60 days of funding", resolution: ["Request fresh CPL from Title Co.", "Upload to Prelim Folder", "Re-run both checklist items"] },
      { kind: "Wire Instructions 3-Way Mismatch", severity: "danger", detail: "Bank ABA on Wire Instructions doesn't match Master List entry", rule: "File Set-Up item 10 — Wire three-way match (Agents ↔ Master List ↔ Wire doc)", resolution: ["Contact Escrow Officer to confirm correct ABA", "Update Master List if bank changed", "Re-run checklist item 10"] },
      { kind: "VVOE Window Expired", severity: "danger", detail: "VVOE completed 7 days ago; funding in 2 days — outside 5-day rule", rule: "Closing Checklist item 9 — VVOE within 5/10/FHA-day-of", resolution: ["Re-order VOE via The Work Number", "Upload to VOE 1/2/3 slot", "Screen and re-run item 9"] },
      { kind: "USDA Deductible Exceeds 1%", severity: "warn", detail: "Deductible $1,250 exceeds $1,000 / 1% USDA/Bond rule", rule: "Closing Checklist item 3 — USDA/Bond hazard deductible ≤ $1,000 or 1%", resolution: ["Request endorsement to $1,000 deductible", "Upload amended dec page", "Re-run checklist item 3"] },
      { kind: "CC&R Missing (VA+PUD)", severity: "warn", detail: "VA + PUD loan: CC&Rs not yet ordered from Title", rule: "File Set-Up item 11 — VA+PUD triggers CC&R order into Prelim Folder", resolution: ["Draft CC&R request to Title", "Upload response to Prelim Folder behind plat map", "Note in Internal Comments"] }
    ];

    function buildExceptions() {
      const out = [];
      let i = 0;
      for (const l of LOANS) {
        if (out.length >= 14) break;
        const hasEsc = l.jp.some(x=>x.status==="escalated") || l.pc.some(x=>x.status==="escalated");
        if (!hasEsc) continue;
        const lib = EXCEPTION_LIB[i % EXCEPTION_LIB.length];
        i++;
        out.push({
          id: `exc-${l.number}-${i}`,
          loan: l,
          ...lib,
          opened: new Date(Date.now() - int(5, 180) * 60 * 1000)
        });
      }
      return out;
    }
    const EXCEPTIONS = buildExceptions();

    const ResolutionModal = ({ exception, onClose }) => {
      const { dispatch } = useApp();
      const [step, setStep] = useState(0);
      const [completed, setCompleted] = useState([]);
      if (!exception) return null;
      const { loan } = exception;
      const sevTone = exception.severity === "danger" ? "danger" : exception.severity === "warn" ? "warn" : "info";

      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [onClose]);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(15, 23, 42, 0.45)" }}>
          <div className="bg-white rounded-lg border border-gray-200 shadow-2xl w-full max-w-2xl flex flex-col fade-in-up" style={{ maxHeight: "90vh" }}>
            <div className="px-5 py-4 border-b border-gray-200 flex items-start justify-between">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <Pill tone={sevTone}>
                    <Icon name={exception.severity === "danger" ? "alert-octagon" : exception.severity === "warn" ? "alert-triangle" : "info"} size={11} />
                    {exception.severity.toUpperCase()}
                  </Pill>
                  <Pill tone="navy" size="xs">#{loan.number}</Pill>
                  <Pill tone="mute" size="xs">{loan.product}</Pill>
                </div>
                <h3 className="text-base font-semibold brand-navy">{exception.kind}</h3>
                <div className="text-xs text-gray-500 mt-0.5">{loan.borrower} · {loan.property.city}, {loan.property.state} · Opened {fmtTime(exception.opened)}</div>
              </div>
              <button onClick={onClose} className="p-1.5 rounded hover:bg-gray-100"><Icon name="x" size={16} /></button>
            </div>
            <div className="px-5 py-4 overflow-y-auto flex-1 space-y-4">
              <div className="bg-brand-navy-50 border border-brand-navy-100 rounded-md p-3">
                <div className="text-[11px] uppercase tracking-wider font-semibold text-brand-navy-dark mb-1">ADE finding</div>
                <div className="text-sm text-gray-800">{exception.detail}</div>
              </div>
              <div>
                <div className="text-[11px] uppercase tracking-wider font-semibold text-gray-500 mb-1">Rule applied</div>
                <div className="text-sm text-gray-800">{exception.rule}</div>
              </div>
              <div>
                <div className="text-[11px] uppercase tracking-wider font-semibold text-gray-500 mb-2">Resolution workspace</div>
                <div className="space-y-2">
                  {exception.resolution.map((r, idx) => {
                    const done = completed.includes(idx);
                    return (
                      <div key={idx} className={`flex items-start gap-3 p-2.5 rounded-md border ${done?"bg-emerald-50 border-emerald-200":step===idx?"bg-white border-brand-navy":"bg-gray-50 border-gray-200"}`}>
                        <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-semibold shrink-0 mt-0.5 ${done?"bg-emerald-600 text-white":step===idx?"bg-brand-navy text-white":"bg-gray-200 text-gray-600"}`}>
                          {done ? <Icon name="check" size={12}/> : idx+1}
                        </div>
                        <div className="flex-1">
                          <div className="text-sm text-gray-800">{r}</div>
                        </div>
                        {!done && step === idx && (
                          <Btn size="sm" variant="primary" onClick={()=>{
                            setCompleted([...completed, idx]);
                            setStep(idx+1);
                            if (idx === exception.resolution.length - 1) {
                              dispatch({type:"TOAST", toast: `Exception resolved on #${loan.number}`});
                            }
                          }}>Complete</Btn>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
              {completed.length === exception.resolution.length && (
                <div className="bg-emerald-50 border border-emerald-200 rounded-md p-3 flex items-center gap-2">
                  <Icon name="check-circle-2" size={16} className="text-emerald-700" />
                  <div className="text-sm text-emerald-800">All resolution steps complete. ADE will re-run affected checklist items.</div>
                </div>
              )}
            </div>
            <div className="px-5 py-3 border-t border-gray-200 bg-gray-50 flex items-center justify-between rounded-b-lg">
              <div className="flex items-center gap-2">
                <Btn variant="ghost" size="sm" icon="external-link" onClick={()=>{ dispatch({type:"SELECT_LOAN", id: loan.number}); onClose(); }}>Open loan</Btn>
                <Btn variant="ghost" size="sm" icon="user-plus" onClick={()=>dispatch({type:"TOAST", toast:"Reassigned to Jessica Alvarez (Processor)"})}>Reassign</Btn>
              </div>
              <div className="flex items-center gap-2">
                <Btn variant="secondary" size="sm" onClick={onClose}>Close</Btn>
                {completed.length === exception.resolution.length && (
                  <Btn variant="success" size="sm" icon="check" onClick={()=>{ dispatch({type:"TOAST", toast:"Marked resolved; item re-queued for ADE"}); onClose(); }}>Mark resolved</Btn>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const ExceptionsPanel = () => {
      const [open, setOpen] = useState(null);
      const [filter, setFilter] = useState("all");
      const filtered = filter === "all" ? EXCEPTIONS : EXCEPTIONS.filter(e => e.severity === filter);
      return (
        <Fragment>
          <Card padding="p-0" className="overflow-hidden">
            <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Icon name="alert-triangle" size={16} className="text-amber-600" />
                <div className="text-sm font-semibold brand-navy">Today's Exceptions</div>
                <Pill tone="warn" size="xs">{EXCEPTIONS.length}</Pill>
              </div>
              <div className="flex items-center gap-1 bg-gray-50 border border-gray-200 rounded-md p-0.5">
                {["all","danger","warn","info"].map(f => (
                  <button key={f} onClick={()=>setFilter(f)}
                    className={`text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded ${filter===f?"bg-white border border-gray-300 font-semibold brand-navy":"text-gray-500 hover:bg-white"}`}>
                    {f}
                  </button>
                ))}
              </div>
            </div>
            <div className="overflow-y-auto" style={{ maxHeight: 520 }}>
              {filtered.length === 0 ? (
                <div className="px-4 py-10 text-center">
                  <Icon name="check-circle-2" size={28} className="text-emerald-500 mx-auto mb-2" />
                  <div className="text-sm text-gray-700 font-medium">Queue is clear</div>
                  <div className="text-xs text-gray-500">No exceptions match this filter.</div>
                </div>
              ) : filtered.map(e => (
                <button key={e.id} onClick={()=>setOpen(e)}
                  className="w-full text-left px-4 py-3 border-b border-gray-100 hover:bg-gray-50 flex items-start gap-3">
                  <div className="shrink-0 mt-0.5">
                    {e.severity==="danger" && <Icon name="alert-octagon" size={16} className="text-red-600"/>}
                    {e.severity==="warn" && <Icon name="alert-triangle" size={16} className="text-amber-600"/>}
                    {e.severity==="info" && <Icon name="info" size={16} className="text-sky-600"/>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-0.5">
                      <span className="text-sm font-semibold text-brand-navy-dark">{e.kind}</span>
                      <Pill tone="navy" size="xs">#{e.loan.number.slice(-5)}</Pill>
                      <Pill tone="mute" size="xs">{e.loan.product}</Pill>
                    </div>
                    <div className="text-xs text-gray-700">{e.detail}</div>
                    <div className="text-[11px] text-gray-500 mt-1">{e.loan.borrower} · opened {fmtTime(e.opened)}</div>
                  </div>
                  <Icon name="chevron-right" size={14} className="text-gray-400 shrink-0 mt-1" />
                </button>
              ))}
            </div>
          </Card>
          {open && <ResolutionModal exception={open} onClose={()=>setOpen(null)} />}
        </Fragment>
      );
    };

    const CommandCenter = () => {
      const { state } = useApp();
      const k = state.kpis;
      const cycleDelta = ((k.avgCycleManual - k.avgCycleADE)/k.avgCycleManual*100).toFixed(0);

      return (
        <div className="p-6 space-y-5">
          <Section eyebrow="Operations" title="Command Center"
            right={
              <div className="flex items-center gap-2 text-xs text-gray-500">
                <Icon name="clock" size={14} />
                {new Date().toLocaleString("en-US", { weekday:"short", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" })}
              </div>
            } />
          <AdeHero />
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
            <KPI label="Loans in pipeline" value={k.loansInFlight} sub="Active files across all phases" tooltip="Total loans currently managed by the ADE" />
            <KPI label="Applications today" value={k.applicationsToday} delta="+3 vs 7d avg" tooltip="New 1003 applications received today" />
            <KPI label="Avg cycle time" value={`${k.avgCycleADE}d`} delta={`−${cycleDelta}% vs manual`} sub={`Manual baseline: ${k.avgCycleManual}d`} tooltip="ADE-managed files vs pre-ADE baseline" />
            <KPI label="Automation rate" value={`${k.automationRate}%`} delta="+1.8 pts" sub="Checklist items auto-verified" tooltip="% of checklist items auto-verified without human touch" />
            <KPI label="Auto-cleared today" value={k.autoClearedToday} sub="Conditions & checklist items" tooltip="Items cleared by ADE today (both playbooks)" />
            <KPI label="Exceptions open" value={k.exceptionsOpen} deltaTone="warn" delta="awaiting review" tooltip="Items the ADE escalated to a human" />
          </div>
          <PipelineHeatmap />
          <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
            <div className="lg:col-span-3">
              <ActivityFeed />
            </div>
            <div className="lg:col-span-2">
              <ExceptionsPanel />
            </div>
          </div>
        </div>
      );
    };

    /* ═════════════════════════════════════════════════════════════════════════════
       PHASE 1 STUB PAGES (filled in Phases 2-5)
    ═════════════════════════════════════════════════════════════════════════════ */
    const PhaseStub = ({ title, planned }) => (
      <div className="p-6">
        <Section eyebrow="Coming in next phase" title={title} />
        <Card>
          <div className="flex items-start gap-4">
            <div className="w-10 h-10 rounded-md bg-brand-navy-50 flex items-center justify-center">
              <Icon name="construction" size={20} className="brand-navy" />
            </div>
            <div className="flex-1">
              <div className="text-sm text-gray-700 mb-2">This section is fully specified and will be built out in the upcoming phase.</div>
              <ul className="text-xs text-gray-600 list-disc pl-5 space-y-1">
                {planned.map((p,i) => <li key={i}>{p}</li>)}
              </ul>
            </div>
          </div>
        </Card>
      </div>

      const path = points.map((p, i) => `${i===0?"M":"L"} ${i*step},${100 - ((p-min)/range)*100}`).join(" ");
      const area = `${path} L 100,100 L 0,100 Z`;
      return (
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width: "100%", height }}>
          <path d={area} fill={color} fillOpacity="0.08" />

    const App = () => {

      // Simulation engine — emits events at a cadence based on speed & running flag
      useEffect(() => {
        if (!state.adeRunning) return;
        let timer;
        const tick = () => {
          const loan = pick(LOANS);
          const template = pick(ACTION_TEMPLATES);
          const ev = template(loan);
          const event = {
            id: `ev-${Date.now()}-${Math.random().toString(36).slice(2,8)}`,
            ts: new Date(),
            loanNumber: loan.number,
            ...ev
          };
          dispatch({ type: "PUSH_EVENT", event });
          // schedule next — 1.8-3.8s at 1x
          const base = 1800 + Math.random() * 2000;
          const delay = Math.max(300, base / state.speed);
          timer = setTimeout(tick, delay);
        };
        timer = setTimeout(tick, 600);
        return () => clearTimeout(timer);
      }, [state.adeRunning, state.speed]);

      // Occasional new application — every ~20s at 1x
      useEffect(() => {
        if (!state.adeRunning) return;
        const iv = setInterval(() => {
          dispatch({ type: "NEW_APPLICATION" });
        }, 20000 / state.speed);
        return () => clearInterval(iv);
      }, [state.adeRunning, state.speed]);

      // Keyboard: Esc closes dropdowns via click-away effect (kept for future modals)
      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") { /* hook for modals */ } };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      return (
        <AppCtx.Provider value={{ state, dispatch, LOANS, JP_CHECKLIST, PC_CHECKLIST, MORTGAGEE_CLAUSE, LQB_SCREENS, LQB_FOLDERS }}>

        </AppCtx.Provider>
      );
    };
